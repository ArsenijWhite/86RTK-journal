<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --error: #ef4444; 
            --gold: #fbbf24;
        }
        * { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        html, body { background-color: var(--bg); margin: 0; padding: 0; color: var(--text); min-height: 100vh; }
        body { padding: 20px; padding-bottom: 50px; }

        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.6s ease; 
        }
        .logo-container { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .logo-outline {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid rgba(56, 189, 248, 0.1);
            border-top: 2px solid var(--accent);
            animation: spin 1.5s linear infinite;
        }
        .logo-icon {
            width: 45px; height: 60px; background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border-radius: 5px 12px 12px 5px; animation: pulse-inner 2s infinite ease-in-out;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-inner { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #main-content { opacity: 0; transition: 0.5s; }
        .header-title { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        #search { width: 100%; border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 15px; background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; }

        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-size: 16px; font-weight: 600; display: flex; flex-direction: column; gap: 4px; }
        .abs-badge { font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; width: fit-content; }

        .score-pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; min-width: 38px; text-align: center; }
        .m-low { background: #ef4444; } .m-warn { background: #f59e0b; } .m-high { background: #10b981; }
        .m-gold { background: var(--gold); color: #000; } .m-none { background: rgba(255,255,255,0.1); }

        .subs-container { display: none; padding-top: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .subs-container.open { display: block; }
        .sub-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .marks-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; margin-bottom: 15px; }
        .mark { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .fab-update { position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="logo-container"><div class="logo-outline"></div><div class="logo-icon"></div></div>
        <div style="color:var(--accent); font-size:10px; letter-spacing:2px;">ОБНОВЛЕНИЕ...</div>
    </div>

    <div id="main-content">
        <div class="header-title">Журнал 86РТК</div>
        <input type="text" id="search" placeholder="Поиск по фамилии..." autocomplete="off">
        <div id="list"></div>
    </div>

    <div class="fab-update" onclick="forceUpdate()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </div>

    <script>
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbzKa6oy63MTEIrKEh8ghNYt7fP6bDnhxXlldgpo7FiNbbz_a4njlMP1cFKCYfLTNbo/exec';
        const API_ABSENCES = 'https://script.google.com/macros/s/AKfycbwjh11bIROjdQIWt2_N6Byvy-O6es0WRZGezl7RVUFHqTEclYuLnRU5LqmzyZqCpIIVzw/exec';
        
        let ALL_DATA = { journal: [], absences: {} };
        const tg = window.Telegram?.WebApp;

        window.onload = () => {
            if(tg) { tg.ready(); tg.expand(); }
            loadData();
        };

        async function loadData() {
            try {
                const timestamp = Date.now();
                const [resJ, resA] = await Promise.all([
                    fetch(`${API_JOURNAL}?t=${timestamp}`).then(r => r.json()),
                    fetch(`${API_ABSENCES}?t=${timestamp}`).then(r => r.json())
                ]);

                ALL_DATA.journal = Array.isArray(resJ) ? resJ : [];
                ALL_DATA.absences = {};
                if (Array.isArray(resA)) {
                    resA.forEach(item => { ALL_DATA.absences[item.name] = item.count; });
                }

                renderList(ALL_DATA.journal);
                hideLoader();
            } catch (err) {
                console.error(err);
                alert("Ошибка загрузки данных");
                hideLoader();
            }
        }

        function renderList(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                const abs = ALL_DATA.absences[student.studentName] || "0";
                card.innerHTML = `
                    <div class="student-header" onclick="toggleCard(this)">
                        <div class="student-name">
                            ${student.studentName}
                            <span class="abs-badge">Отгулы: ${abs}</span>
                        </div>
                        <div class="score-pill ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">
                        ${student.subjects.map(s => `
                            <div class="sub-row">
                                <div style="font-size:13px;">${s.subject}</div>
                                <div class="score-pill ${getStyle(s.avg)}">${s.avg}</div>
                            </div>
                            <div class="marks-row">
                                ${s.marks.map(m => `<div class="mark ${getStyle(m)}">${m}</div>`).join('')}
                            </div>
                        `).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function toggleCard(el) {
            el.parentElement.querySelector('.subs-container').classList.toggle('open');
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold';
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }

        function forceUpdate() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').style.opacity = '1';
            loadData();
        }

        function hideLoader() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
            }, 600);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            renderList(ALL_DATA.journal.filter(s => s.studentName.toLowerCase().includes(val)));
        });
    </script>
</body>
</html>
