<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GradeBook Pro</title>
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        :root {
            --tg-theme-bg-color: #f4f7f9;
            --tg-theme-text-color: #1c1c1e;
            --tg-theme-button-color: #007aff;
        }
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .grade-badge {
            transition: transform 0.2s;
        }
        .grade-badge:active { transform: scale(0.95); }
        
        /* Плавное появление списка */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        .animate-slide { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="p-4 transition-colors duration-300">

    <!-- Header -->
    <div class="mb-6">
        <h1 class="text-3xl font-extrabold tracking-tight mb-1 text-slate-800">Журнал</h1>
        <p id="group-label" class="text-blue-500 font-semibold text-sm uppercase tracking-widest opacity-80">Группа Э-24</p>
    </div>

    <!-- Поиск -->
    <div class="relative mb-6">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"></path></svg>
        </div>
        <input type="text" id="search" placeholder="Найти студента..." 
               class="block w-full pl-10 pr-4 py-3 border-none rounded-2xl glass-card focus:ring-2 focus:ring-blue-500 transition-all text-sm">
    </div>

    <div id="app">
        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-500 animate-pulse">Синхронизация с облаком...</p>
        </div>

        <div id="content" class="grid gap-4"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbya6kGZyxyf7CCzQ4PAYwaG08GIXYV5ggMh8wuh6sAnxQIS5c5gG6Dv0ewzJ5J1lOJG/exec';
        let studentsData = [];

        // Инициализация Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        tg.ready();

        async function init() {
            try {
                const res = await fetch(API_URL);
                studentsData = await res.json();
                document.getElementById('loader').classList.add('hidden');
                render(studentsData);
            } catch (e) {
                document.getElementById('loader').innerHTML = "<p class='text-red-500 text-center font-bold'>Ошибка подключения к базе данных</p>";
            }
        }

        function getGradeColor(grade) {
            const val = parseFloat(grade.replace(',', '.'));
            if (val >= 8) return 'bg-green-100 text-green-700';
            if (val >= 6) return 'bg-blue-100 text-blue-700';
            if (val >= 4) return 'bg-yellow-100 text-yellow-700';
            return 'bg-red-100 text-red-700';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            data.forEach((student, i) => {
                const card = document.createElement('div');
                card.className = `glass-card p-5 rounded-[2rem] animate-slide`;
                card.style.animationDelay = `${i * 0.05}s`;

                const subjects = student.subjects.map(s => `
                    <div class="flex justify-between items-center py-2 border-b border-gray-100/50 last:border-0">
                        <span class="text-gray-500 text-[13px] font-medium truncate pr-4">${s.subject}</span>
                        <span class="px-2 py-1 rounded-lg font-bold text-xs ${getGradeColor(s.avg)}">${s.avg}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-lg">
                                ${student.studentName.charAt(0)}
                            </div>
                            <h2 class="font-bold text-slate-800 text-base leading-tight">${student.studentName}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Общий</p>
                            <p class="text-2xl font-black text-slate-800 leading-none">${student.totalAverage}</p>
                        </div>
                    </div>
                    <div class="space-y-1 bg-white/40 rounded-2xl p-2">
                        ${subjects}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = studentsData.filter(s => s.studentName.toLowerCase().includes(val));
            render(filtered);
        });

        init();
    </script>
</body>
</html>
