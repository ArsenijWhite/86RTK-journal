<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            /* Синяя палитра */
            --bg: #0f172a;        /* Глубокий синий фон */
            --card: #1e293b;      /* Цвет карточек (Navy) */
            --accent: #38bdf8;    /* Небесно-голубой акцент */
            --text: #f1f5f9;      /* Светлый текст */
            --muted: #94a3b8;     /* Приглушенный текст */
            --error: #ef4444; 
            --gold: #fbbf24;
        }
        * { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        html, body { background-color: var(--bg); margin: 0; padding: 0; color: var(--text); min-height: 100vh; }
        body { padding: 20px; padding-bottom: 50px; }

        /* ЛОАДЕР */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .logo-container { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .logo-outline {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid rgba(56, 189, 248, 0.1);
            border-top: 2px solid var(--accent);
            box-shadow: 0 -5px 15px rgba(56, 189, 248, 0.3);
            animation: spin 1.5s linear infinite;
        }
        .logo-icon {
            width: 45px; height: 60px; background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border-radius: 5px 12px 12px 5px; position: relative; z-index: 2;
        }
        .loader-text { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4em; margin-bottom: 35px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ИНТЕРФЕЙС */
        #main-content { opacity: 0; transition: 0.5s; }
        .header-title { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        #search { width: 100%; border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 15px; background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; transition: 0.3s; }
        #search:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-size: 16px; font-weight: 600; }

        .score-pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; min-width: 38px; text-align: center; }
        .m-low { background: #ef4444; } .m-warn { background: #f59e0b; } .m-high { background: #10b981; }
        .m-gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .m-none { background: rgba(255,255,255,0.1); color: var(--muted); }

        .subs-container { display: none; padding-top: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .subs-container.open { display: block; }
        .sub-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .marks-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .mark { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .fab-update { position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">Загрузка журнала...</div>
        <div class="logo-container">
            <div class="logo-outline"></div>
            <div class="logo-icon"></div>
        </div>
    </div>

    <div id="main-content">
        <div class="header-title">Журнал 86РТК</div>
        <input type="text" id="search" placeholder="Поиск по фамилии..." autocomplete="off">
        <div id="list"></div>
    </div>

    <div class="fab-update" onclick="forceUpdate()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </div>

    <script>
        // ССЫЛКА НА ЖУРНАЛ
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbzrbDXKkZhKJohza3bbsUF1eoDb9WbLcdfdfheog9cpsPpVHrScR0qb2TVc9JTGtN0b/exec';
        
        const tg = window.Telegram?.WebApp;
        let ALL_DATA = [];

        window.onload = () => {
            if(tg) {
                tg.ready();
                tg.expand();
            }
            loadData();
        };

        async function loadData() {
            try {
                // Добавляем timestamp для принудительного обновления данных
                const response = await fetch(API_JOURNAL + '?t=' + Date.now());
                const data = await response.json();
                
                ALL_DATA = Array.isArray(data) ? data : [];
                renderList(ALL_DATA);
                hideLoader();
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                hideLoader();
            }
        }

        function renderList(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="student-header" onclick="toggleCard(this)">
                        <div class="student-name">${student.studentName}</div>
                        <div class="score-pill ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">
                        ${student.subjects.map(s => `
                            <div style="margin-bottom: 15px;">
                                <div class="sub-row">
                                    <div style="font-size: 13px; color: var(--muted);">${s.subject}</div>
                                    <div class="score-pill ${getStyle(s.avg)}" style="scale: 0.8">${s.avg}</div>
                                </div>
                                <div class="marks-row">
                                    ${s.marks.map(m => `<div class="mark ${getStyle(m)}">${m}</div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function toggleCard(el) {
            el.nextElementSibling.classList.toggle('open');
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold'; 
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }

        function forceUpdate() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            loadData();
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            const main = document.getElementById('main-content');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                main.style.opacity = '1';
            }, 600);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = ALL_DATA.filter(s => s.studentName.toLowerCase().includes(val));
            renderList(filtered);
        });
    </script>
</body>
</html>
