<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал Э-24</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #2d3735; 
            --card: #3a4744;
            --accent: #10b981;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        html, body {
            background-color: var(--bg) !important;
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body { padding: 20px; box-sizing: border-box; }

        /* КРУТОЙ ЛИНЕЙНЫЙ ЛОАДЕР */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); z-index: 1000; transition: opacity 0.4s ease;
        }

        .loader-text {
            font-size: 13px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.15em;
            margin-bottom: 20px; animation: pulseText 1.5s infinite ease-in-out;
        }

        .progress-container {
            width: 140px; height: 3px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; position: relative;
        }

        .progress-bar {
            width: 60px; height: 100%; background: var(--accent);
            border-radius: 10px; position: absolute;
            animation: slideLine 1.2s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes slideLine {
            0% { left: -60px; }
            50% { left: 140px; }
            100% { left: -60px; }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-content { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
        #main-content.visible { opacity: 1; transform: translateY(0); }

        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 24px; color: #fff; }

        #search {
            width: 100%; border: none; padding: 16px 20px; border-radius: 18px;
            background: rgba(255, 255, 255, 0.07); color: #fff;
            font-size: 16px; margin-bottom: 24px; outline: none; box-sizing: border-box;
        }

        .card {
            background: var(--card); border-radius: 28px; padding: 22px; margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .student-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .score-pill { font-size: 13px; font-weight: 800; padding: 5px 12px; border-radius: 10px; min-width: 35px; text-align: center; }

        .m-high { background: #065f46; color: #a7f3d0; }
        .m-mid  { background: #1e3a8a; color: #bfdbfe; }
        .m-warn { background: #78350f; color: #fef08a; }
        .m-low  { background: #7f1d1d; color: #fecaca; }

        .subs-container { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; }
        .subs-container.open { display: block; animation: slideIn 0.3s ease; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body>

    <!-- Линейный лоадер -->
    <div id="loader">
        <div class="loader-text">Инициализация</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <div id="main-content">
        <div class="header-title">Журнал</div>
        <input type="text" id="search" placeholder="Поиск по фамилии...">
        <div id="content"></div>
    </div>

    <script>
        const API_URL = 'ВАША_ССЫЛКА_EXEC';
        const tg = window.Telegram.WebApp;

        // Полноэкранный режим
        function setupApp() {
            tg.ready();
            tg.expand();
            tg.headerColor = '#2d3735';
            tg.backgroundColor = '#2d3735';
        }

        async function init() {
            setupApp();
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Плавное переключение
                const loader = document.getElementById('loader');
                const main = document.getElementById('main-content');
                
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    main.classList.add('visible');
                    render(data);
                }, 400);

            } catch (e) {
                document.querySelector('.loader-text').innerText = "Ошибка сети";
                document.querySelector('.progress-bar').style.background = "#ef4444";
            }
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (v >= 9 || v === 5) return 'm-high';
            if (v >= 7 || v === 4) return 'm-mid';
            if (v >= 4 || v === 3) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => card.querySelector('.subs-container').classList.toggle('open');
                
                let subs = student.subjects.map(s => `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03)">
                        <span style="font-size:14px; opacity:0.6">${s.subject}</span>
                        <span class="score-pill ${getStyle(s.avg)}">${s.avg}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="student-header">
                        <span style="font-weight:700; font-size:18px">${student.studentName}</span>
                        <div class="score-pill ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">${subs}</div>
                `;
                container.appendChild(card);
            });
        }

        // Поиск
        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const name = card.querySelector('.student-name')?.innerText.toLowerCase() || 
                             card.querySelector('span').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'block' : 'none';
            });
        };

        init();
        // Лайфхак для открытия на весь экран при первом касании
        document.addEventListener('touchstart', () => { if(!tg.isExpanded) tg.expand(); }, {passive: true});
    </script>
</body>
</html>
