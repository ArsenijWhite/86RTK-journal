<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал Э-24</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #2d3735; 
            --card: #3a4744;
            --accent: #10b981;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        html, body {
            background-color: var(--bg) !important;
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- СТИЛЬНЫЙ ЛОАДЕР --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); z-index: 1000; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-content { display: flex; flex-direction: column; align-items: center; }

        /* Анимация текста "Загрузка" (эффект дыхания и мерцания) */
        .loader-text {
            font-size: 11px; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.4em;
            margin-bottom: 24px; position: relative;
            animation: textBreath 3s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes textBreath {
            0%, 100% { opacity: 0.3; transform: scale(0.98); filter: blur(1px); }
            50% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        /* Стильная полоска */
        .progress-wrapper {
            width: 180px; height: 2px; background: rgba(255, 255, 255, 0.03);
            border-radius: 4px; overflow: hidden; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .progress-line {
            width: 80px; height: 100%; background: var(--accent);
            border-radius: 4px; position: absolute;
            /* Медленная, плавная анимация (3 секунды) */
            animation: slowSlide 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            box-shadow: 0 0 15px var(--accent), 0 0 5px white;
        }

        @keyframes slowSlide {
            0% { transform: translateX(-100px); }
            50% { transform: translateX(200px); }
            100% { transform: translateX(-100px); }
        }

        /* --- КОНТЕНТ --- */
        #main-content { opacity: 0; filter: blur(10px); transform: scale(0.98); transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        #main-content.visible { opacity: 1; filter: blur(0px); transform: scale(1); }

        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.04em; padding: 20px 20px 0; }
        #search {
            width: calc(100% - 40px); margin: 0 20px 24px; border: none; padding: 18px 22px; 
            border-radius: 20px; background: rgba(255, 255, 255, 0.08); color: #fff;
            font-size: 16px; outline: none; box-sizing: border-box;
        }

        .card {
            background: var(--card); border-radius: 30px; padding: 24px; margin: 0 20px 18px;
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .score-pill { font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 12px; }

        .m-high { background: #065f46; color: #a7f3d0; }
        .m-mid  { background: #1e3a8a; color: #bfdbfe; }
        .m-warn { background: #78350f; color: #fef08a; }
        .m-low  { background: #7f1d1d; color: #fecaca; }

        .subs-container { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }
        .subs-container.open { display: block; animation: slideIn 0.5s ease; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body>

    <!-- Лоадер -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-text" id="status-text">Загрузка</div>
            <div class="progress-wrapper">
                <div class="progress-line" id="p-line"></div>
            </div>
        </div>
    </div>

    <!-- Контент -->
    <div id="main-content">
        <div class="header-title">Журнал</div>
        <input type="text" id="search" placeholder="Поиск фамилии...">
        <div id="content"></div>
    </div>

    <script>
        const API_URL = 'ВАША_ССЫЛКА_EXEC'; 
        const tg = window.Telegram?.WebApp;

        function setupApp() {
            if (tg) {
                tg.ready(); tg.expand();
                tg.headerColor = '#2d3735'; tg.backgroundColor = '#2d3735';
                setTimeout(() => tg.expand(), 500);
            }
        }

        async function init() {
            setupApp();
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const loader = document.getElementById('loader');
                const main = document.getElementById('main-content');
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        main.style.display = 'block';
                        setTimeout(() => main.classList.add('visible'), 50);
                        render(data);
                    }, 800);
                }, 1000);

            } catch (e) {
                document.getElementById('status-text').innerText = "Ошибка сети";
                document.getElementById('p-line').style.background = "#f87171";
            }
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (v >= 9 || v === 5) return 'm-high';
            if (v >= 7 || v === 4) return 'm-mid';
            if (v >= 4 || v === 3) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => card.querySelector('.subs-container').classList.toggle('open');
                let subs = student.subjects.map(s => `
                    <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.03)">
                        <span style="font-size:14px; color:var(--muted); font-weight:600;">${s.subject}</span>
                        <span class="score-pill ${getStyle(s.avg)}">${s.avg}</span>
                    </div>
                `).join('');
                card.innerHTML = `
                    <div class="student-header">
                        <span style="font-weight:700; font-size:20px; color:#fff;">${student.studentName}</span>
                        <div class="score-pill ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">${subs}</div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.card').forEach(card => {
                const name = card.querySelector('span').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'block' : 'none';
            });
        };

        init();
        document.addEventListener('touchstart', () => { if(tg && !tg.isExpanded) tg.expand(); }, {passive: true});
    </script>
</body>
</html>
