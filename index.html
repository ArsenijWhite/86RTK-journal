<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --error: #ef4444;
            --gold: #fbbf24;
            --exam-color: #f472b6;
            --exam-bg: rgba(244, 114, 182, 0.12);
        }
        * { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            box-sizing: border-box; 
        }
        html, body { 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text); 
            min-height: 100vh; 
        }
        body { 
            padding: 16px; 
            padding-bottom: 85px; 
        }

        /* ЛОАДЕР */
        #loader { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .loader-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }
        
        .logo-container { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 30px; 
        }
        
        .logo-outline {
            position: absolute; 
            width: 100%; 
            height: 100%;
            border-radius: 50%; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        #loader:not(.error-mode) .logo-container {
            animation: breatheContainer 2s ease-in-out infinite;
        }
        
        #loader:not(.error-mode) .logo-outline {
            border: 2px solid rgba(56, 189, 248, 0.15);
            border-top: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            animation: spin 1.2s linear infinite;
        }
        
        #loader:not(.error-mode) .logo-icon {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            animation: breatheIcon 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }
        
        #loader.error-mode .logo-outline {
            border: 2px solid var(--error);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: none;
        }
        
        #loader.error-mode .logo-icon {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: breatheIconError 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        
        .logo-icon {
            width: 45px; 
            height: 60px; 
            border-radius: 5px 12px 12px 5px; 
            position: relative; 
            z-index: 2;
        }
        
        .logo-icon::before {
            content: ""; 
            position: absolute; 
            top: 12px; 
            left: 8px;
            width: 25px; 
            height: 3px; 
            background: rgba(255,255,255,0.5);
            border-radius: 2px; 
            box-shadow: 0 8px 0 rgba(255,255,255,0.5), 0 16px 0 rgba(255,255,255,0.5);
        }
        
        .loader-status { 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 0.3em; 
            margin-bottom: 25px;
        }
        
        .error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
            max-width: 280px;
        }
        
        .error-container.visible {
            display: flex;
        }
        
        .error-message {
            font-size: 13px;
            font-weight: 500;
            color: var(--error);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .retry-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 28px;
            border-radius: 30px;
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
        
        .copyright {
            position: absolute;
            bottom: 25px;
            font-size: 9px;
            color: rgba(255,255,255,0.08);
        }

        @keyframes breatheContainer {
            0% { transform: scale(0.98); }
            50% { transform: scale(1.02); }
            100% { transform: scale(0.98); }
        }
        
        @keyframes breatheIcon {
            0% { transform: scale(0.97); opacity: 0.85; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(0.97); opacity: 0.85; }
        }
        
        @keyframes breatheIconError {
            0% { transform: scale(0.97); opacity: 0.85; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(0.97); opacity: 0.85; }
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* ИНТЕРФЕЙС */
        #main-content { 
            opacity: 0; 
            transition: 0.5s; 
            display: none;
        }
        #main-content.visible {
            display: block;
            opacity: 1;
        }
        
        .header-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .mini-journal-icon {
            width: 28px;
            height: 36px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border-radius: 3px 8px 8px 3px;
            position: relative;
            display: inline-block;
        }
        
        .mini-journal-icon::before {
            content: "";
            position: absolute;
            top: 7px;
            left: 5px;
            width: 18px;
            height: 2px;
            background: rgba(255,255,255,0.6);
            border-radius: 1px;
            box-shadow: 0 7px 0 rgba(255,255,255,0.6), 0 14px 0 rgba(255,255,255,0.6);
        }
        
        .header-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
        }
        
        .header-sub { 
            font-size: 11px; 
            color: var(--muted); 
            margin-bottom: 16px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        
        .tab-page {
            display: none;
        }
        
        .tab-page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #search { 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.08); 
            padding: 12px 16px; 
            border-radius: 14px; 
            background: rgba(255,255,255,0.04); 
            color: #fff; 
            font-size: 15px; 
            outline: none; 
            margin-bottom: 16px; 
        }
        #search:focus { 
            border-color: var(--accent); 
        }
        
        .card { 
            background: var(--card); 
            border-radius: 18px; 
            padding: 14px; 
            margin-bottom: 10px; 
            border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer;
        }
        .card:active { 
            transform: scale(0.98); 
        }
        .student-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .student-name { 
            font-size: 15px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-wrap: wrap; 
        }
        
        .abs-badge {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 5px;
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.05);
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        
        .score-pill { 
            font-size: 11px; 
            font-weight: 700; 
            padding: 3px 8px; 
            border-radius: 7px; 
            min-width: 36px; 
            text-align: center; 
            display: inline-block;
        }
        .m-low { background: #ef4444; color: white; } 
        .m-warn { background: #f59e0b; color: white; } 
        .m-high { background: #10b981; color: white; }
        .m-gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; }
        .m-none { background: rgba(255,255,255,0.08); color: var(--muted); }
        
        .rating-table {
            background: var(--card);
            border-radius: 16px;
            overflow-x: auto;
            overflow-y: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .rating-container {
            min-width: 100%;
            display: table;
        }
        
        .rating-header {
            display: grid;
            grid-template-columns: 35px 1fr 60px 60px 65px;
            background: rgba(56, 189, 248, 0.08);
            padding: 10px 8px;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 4px;
        }
        
        .rating-row {
            display: grid;
            grid-template-columns: 35px 1fr 60px 60px 65px;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
            align-items: center;
            gap: 4px;
        }
        
        .rating-row:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .rating-rank {
            font-weight: 700;
            text-align: left;
            font-size: 13px;
            color: var(--gold);
        }
        
        .rating-name {
            font-weight: 500;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            white-space: normal;
            word-break: break-word;
        }
        
        .rating-sem1, .rating-sem2, .rating-avg {
            text-align: center;
        }
        
        .rating-sem1 .score-pill, 
        .rating-sem2 .score-pill, 
        .rating-avg .score-pill {
            font-size: 10px;
            padding: 2px 6px;
            min-width: 32px;
        }
        
        .medal {
            font-size: 11px;
        }
        
        .subs-container { 
            display: none; 
            padding-top: 12px; 
            margin-top: 12px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }
        .subs-container.open { display: block; }
        .sub-item { 
            margin-bottom: 10px; 
            cursor: pointer; 
            padding: 8px 10px;
            border-radius: 10px;
            transition: background 0.2s;
            position: relative;
        }
        .sub-item.exam-subject {
            background: var(--exam-bg);
            border-left: 3px solid var(--exam-color);
        }
        .sub-item.exam-subject:active {
            background: rgba(244, 114, 182, 0.2);
        }
        .sub-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 6px; 
            font-size: 13px; 
        }
        .subject-name-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .exam-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: var(--exam-color);
            border-radius: 50%;
            color: #0f172a;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .exam-icon:active {
            transform: scale(0.85);
        }
        .exam-icon:hover {
            box-shadow: 0 0 12px rgba(244, 114, 182, 0.5);
        }
        .exam-tooltip {
            display: none;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--exam-color);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 11px;
            color: var(--text);
            line-height: 1.5;
            max-width: 100%;
            margin-top: 6px;
            animation: fadeIn 0.25s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .exam-tooltip.open {
            display: block;
        }
        .exam-tooltip .tooltip-title {
            color: var(--exam-color);
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .exam-tooltip .tooltip-text {
            color: var(--muted);
        }
        .exam-tooltip .tooltip-text strong {
            color: var(--text);
        }
        
        .marks-box { display: none; background: rgba(0,0,0,0.25); padding: 10px; border-radius: 10px; margin-top: 6px; }
        .marks-box.open { display: block; }
        .marks-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .mark { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; font-size: 10px; font-weight: 700; margin-right: 2px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 16px 10px;
            z-index: 1000;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: transparent;
            border: none;
            padding: 6px 12px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            max-width: 120px;
        }
        
        .nav-item:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-icon {
            width: 20px;
            height: 20px;
            position: relative;
            transition: all 0.2s ease;
        }
        
        .icon-journal {
            width: 18px;
            height: 24px;
            background: linear-gradient(135deg, #94a3b8, #64748b);
            border-radius: 2px 5px 5px 2px;
            position: relative;
            transition: all 0.2s ease;
        }
        
        .icon-journal::before {
            content: "";
            position: absolute;
            top: 4px;
            left: 3px;
            width: 12px;
            height: 2px;
            background: rgba(255,255,255,0.5);
            border-radius: 1px;
            box-shadow: 0 5px 0 rgba(255,255,255,0.5), 0 10px 0 rgba(255,255,255,0.5);
        }
        
        .icon-stats {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }
        
        .icon-stats .bar {
            width: 5px;
            background: linear-gradient(135deg, #94a3b8, #64748b);
            border-radius: 2px 2px 1px 1px;
            transition: all 0.2s ease;
        }
        
        .icon-stats .bar1 { height: 12px; }
        .icon-stats .bar2 { height: 17px; }
        .icon-stats .bar3 { height: 8px; }
        
        .nav-item.active .icon-journal {
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            box-shadow: 0 0 6px rgba(56, 189, 248, 0.4);
        }
        
        .nav-item.active .icon-stats .bar {
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.4);
        }
        
        .nav-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--muted);
            transition: all 0.2s ease;
        }
        
        .nav-item.active .nav-label {
            color: var(--accent);
        }
        
        .fab-update { 
            position: fixed; 
            bottom: 75px; 
            right: 16px; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            background: rgba(30, 41, 59, 0.85); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 999; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .fab-update:active { 
            transform: scale(0.92); 
        }
        
        .footer-signature {
            text-align: center;
            padding: 16px 16px 24px;
            color: rgba(255,255,255,0.08);
            font-size: 9px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 13px;
        }
        
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav {
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }
            body {
                padding-bottom: calc(85px + env(safe-area-inset-bottom));
            }
            .fab-update {
                bottom: calc(75px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-inner">
            <div class="logo-container">
                <div class="logo-outline"></div>
                <div class="logo-icon"></div>
            </div>
            <div class="loader-status" id="loaderStatus">Загрузка данных</div>
            <div class="error-container" id="errorContainer">
                <div class="error-message" id="errorMessage">Не удалось подключиться к серверу</div>
                <button class="retry-button" id="retryButton">Повторить</button>
            </div>
        </div>
        <div class="copyright">by @skwared</div>
    </div>

    <div id="main-content">
        <div class="header-title">
            <span class="header-logo"><span class="mini-journal-icon"></span></span>
            Журнал 86РТК
        </div>
        
        <div class="tab-page active" id="page-journal">
            <div class="header-sub">Электронный журнал успеваемости</div>
            <input type="text" id="search" placeholder="Поиск по фамилии" autocomplete="off">
            <div id="list"></div>
        </div>
        
        <div class="tab-page" id="page-rating">
            <div class="header-sub">Итоги (успеваемость по семестрам)</div>
            <div class="rating-table">
                <div class="rating-header">
                    <div>#</div>
                    <div>Фамилия</div>
                    <div>1 сем</div>
                    <div>2 сем</div>
                    <div>Ср.балл</div>
                </div>
                <div id="rating-list"></div>
            </div>
        </div>
        
        <div class="footer-signature">by @skwared</div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-page="journal">
            <div class="nav-icon"><div class="icon-journal"></div></div>
            <span class="nav-label">Журнал</span>
        </button>
        <button class="nav-item" data-page="rating">
            <div class="nav-icon">
                <div class="icon-stats">
                    <div class="bar bar1"></div>
                    <div class="bar bar2"></div>
                    <div class="bar bar3"></div>
                </div>
            </div>
            <span class="nav-label">Итоги</span>
        </button>
    </div>

    <div class="fab-update" id="fabUpdate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
    </div>

    <script>
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            }
        } catch(e) {}
        
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbwtV3eFenNotdiVr3u1DQPJdOLn2fieHDsvWUwlsQquKURzkLkW4wuTiLqkNFnWCH0v/exec';
        const API_ABSENCES = 'https://script.google.com/macros/s/AKfycbyux4wfN_lVoodDq-JHHjbYAGuJys_DsZ2mADyUGdw1MERG-iZK833dN0tSzI7lq_QeZg/exec';
        
        const CACHE_KEY = 'journal_86rtk_v6';
        const EXCLUDED_NAME = "Доревский";
        
        // Список экзаменационных предметов
        const EXAM_SUBJECTS = [
            'охрана труда',
            'электрические измерения',
            'теоретич. основы электромеханики',
            'теоретические основы электромеханики'
        ];
        
        let ALL_DATA = { journal: [], absences: {} };
        let isLoading = false;
        
        function isExamSubject(subjectName) {
            if (!subjectName) return false;
            const name = subjectName.toLowerCase().trim();
            return EXAM_SUBJECTS.some(exam => name.includes(exam) || exam.includes(name));
        }
        
        function calculateAverage(marks) {
            if (!marks || marks.length === 0) return null;
            let sum = 0;
            let count = 0;
            for (let m of marks) {
                let val = parseFloat(String(m).replace(',', '.'));
                if (!isNaN(val) && val > 0) {
                    sum += val;
                    count++;
                }
            }
            if (count === 0) return null;
            let avg = sum / count;
            return avg.toFixed(1).replace('.', ',');
        }
        
        function calculateTotalAverage(subjects) {
            if (!subjects || subjects.length === 0) return null;
            let sum = 0;
            let count = 0;
            for (let sub of subjects) {
                if (sub.avg && sub.avg !== '—') {
                    let val = parseFloat(String(sub.avg).replace(',', '.'));
                    if (!isNaN(val) && val > 0) {
                        sum += val;
                        count++;
                    }
                }
            }
            if (count === 0) return null;
            let avg = sum / count;
            return avg.toFixed(1).replace('.', ',');
        }
        
        function calculateAverageBetweenSemesters(sem1, sem2) {
            if (!sem1 && !sem2) return null;
            let val1 = sem1 ? parseFloat(String(sem1).replace(',', '.')) : null;
            let val2 = sem2 ? parseFloat(String(sem2).replace(',', '.')) : null;
            
            if (val1 !== null && val2 !== null) {
                let avg = (val1 + val2) / 2;
                return avg.toFixed(1).replace('.', ',');
            } else if (val1 !== null) {
                return sem1;
            } else if (val2 !== null) {
                return sem2;
            }
            return null;
        }
        
        function getStyleForScore(score) {
            if (!score || score === '—' || score === '0,0') return 'm-none';
            const v = parseFloat(String(score).replace(',', '.'));
            if (isNaN(v)) return 'm-none';
            if (v >= 9.5) return 'm-gold';
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }
        
        function showError(message) {
            const loader = document.getElementById('loader');
            const loaderStatus = document.getElementById('loaderStatus');
            const errorContainer = document.getElementById('errorContainer');
            const errorMessage = document.getElementById('errorMessage');
            loader.classList.add('error-mode');
            loaderStatus.textContent = 'Ошибка соединения';
            errorMessage.textContent = message || 'Не удалось подключиться к серверу';
            errorContainer.classList.add('visible');
        }
        
        function hideError() {
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('errorContainer');
            loader.classList.remove('error-mode');
            errorContainer.classList.remove('visible');
            document.getElementById('loaderStatus').textContent = 'Загрузка данных';
        }
        
        function filterStudents(students) {
            return students.filter(s => s && s.studentName && !s.studentName.includes(EXCLUDED_NAME));
        }
        
        async function init(force = false) {
            if (isLoading) return;
            isLoading = true;
            
            const loader = document.getElementById('loader');
            const loaderStatus = document.getElementById('loaderStatus');
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            hideError();
            loaderStatus.textContent = 'Загрузка данных';
            
            const timeoutId = setTimeout(() => {
                if (isLoading) showError('Сервер не отвечает');
            }, 20000);
            
            const cached = localStorage.getItem(CACHE_KEY);
            if (!force && cached) {
                try {
                    ALL_DATA = JSON.parse(cached);
                    if (ALL_DATA.journal && ALL_DATA.journal.length > 0) {
                        clearTimeout(timeoutId);
                        processAllAverages();
                        renderJournal();
                        renderRating();
                        hideLoader();
                        isLoading = false;
                        return;
                    }
                } catch(e) {}
            }
            
            try {
                loaderStatus.textContent = 'Загрузка журнала';
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 15000);
                
                const [resJ, resA] = await Promise.all([
                    fetch(API_JOURNAL, { signal: controller.signal }).then(r => r.json()),
                    fetch(API_ABSENCES, { signal: controller.signal }).then(r => r.json())
                ]);
                
                clearTimeout(timeoutId);
                
                const absMap = {};
                if (Array.isArray(resA)) {
                    resA.forEach(a => { 
                        if (a && a.name) absMap[a.name.trim()] = a.count || "0"; 
                    });
                }
                
                let journalData = [];
                if (Array.isArray(resJ)) journalData = resJ;
                else if (resJ && resJ.journal && Array.isArray(resJ.journal)) journalData = resJ.journal;
                else if (resJ && !resJ.error) journalData = resJ;
                
                if (!journalData.length) throw new Error('No data');
                
                ALL_DATA = { journal: journalData, absences: absMap };
                
                processAllAverages();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(ALL_DATA));
                
                renderJournal();
                renderRating();
                hideLoader();
                
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
                
            } catch (e) {
                console.error('Error:', e);
                clearTimeout(timeoutId);
                
                if (ALL_DATA.journal && ALL_DATA.journal.length > 0) {
                    loaderStatus.textContent = 'Использую сохранённые данные';
                    setTimeout(() => {
                        processAllAverages();
                        renderJournal();
                        renderRating();
                        hideLoader();
                    }, 800);
                } else {
                    showError('Проверьте подключение к интернету');
                }
            } finally {
                isLoading = false;
            }
        }
        
        function processAllAverages() {
            for (let student of ALL_DATA.journal) {
                if (student.subjects && Array.isArray(student.subjects)) {
                    for (let subject of student.subjects) {
                        const calculatedAvg = calculateAverage(subject.marks);
                        if (calculatedAvg) {
                            subject.avg = calculatedAvg;
                        } else if (!subject.avg || subject.avg === '—') {
                            subject.avg = '—';
                        }
                    }
                    const totalAvg = calculateTotalAverage(student.subjects);
                    if (totalAvg) {
                        student.totalAverage = totalAvg;
                    } else if (!student.totalAverage || student.totalAverage === '0,0') {
                        student.totalAverage = '—';
                    }
                }
            }
        }
        
        function renderJournal() {
            const container = document.getElementById('list');
            if (!container) return;
            container.innerHTML = '';
            const query = document.getElementById('search')?.value.toLowerCase().trim() || '';
            
            if (!ALL_DATA.journal || ALL_DATA.journal.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет данных</div>';
                return;
            }
            
            let filteredStudents = filterStudents(ALL_DATA.journal);
            
            const sortedByTotal = [...filteredStudents].sort((a, b) => {
                const avgA = parseFloat(String(a.totalAverage).replace(',', '.'));
                const avgB = parseFloat(String(b.totalAverage).replace(',', '.'));
                if (isNaN(avgA)) return 1;
                if (isNaN(avgB)) return -1;
                return avgB - avgA;
            });
            const topNames = sortedByTotal.slice(0, 3).map(s => s.studentName);
            const crowns = ['🥇', '🥈', '🥉'];
            
            const list = filteredStudents
                .filter(s => s && s.studentName && s.studentName.toLowerCase().includes(query))
                .sort((a, b) => a.studentName.localeCompare(b.studentName));
            
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                return;
            }
            
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                const absCount = ALL_DATA.absences[s.studentName] || "0";
                const tIdx = topNames.indexOf(s.studentName);
                
                let subsHtml = '';
                if (s.subjects && Array.isArray(s.subjects)) {
                    subsHtml = s.subjects.map(sub => {
                        const isExam = isExamSubject(sub.subject);
                        const marksHtml = (sub.marks && Array.isArray(sub.marks) && sub.marks.length > 0)
                            ? sub.marks.map(m => `<div class="mark ${getStyleForScore(m)}">${m}</div>`).join('')
                            : '<div style="font-size:10px; opacity:0.4; padding:6px;">Нет отметок</div>';
                        
                        const avgDisplay = sub.avg && sub.avg !== '—' ? sub.avg : '—';
                        const examClass = isExam ? 'exam-subject' : '';
                        
                        // Создаём подсказку с уникальным ID для управления
                        const tooltipId = 'tooltip_' + Math.random().toString(36).substr(2, 9);
                        const examIcon = isExam ? `
                            <span class="exam-icon" onclick="event.stopPropagation(); toggleTooltip('${tooltipId}')">!</span>
                            <div class="exam-tooltip" id="${tooltipId}">
                                <div class="tooltip-title">📝 Экзаменационный предмет</div>
                                <div class="tooltip-text">Итоговая отметка может <strong>отличаться</strong> от текущей успеваемости и выставляется по результатам экзамена.</div>
                            </div>
                        ` : '';
                        
                        return `<div class="sub-item ${examClass}" data-tooltip="${tooltipId}">
                            <div class="sub-row">
                                <div class="subject-name-wrapper">
                                    <span>${escapeHtml(sub.subject || 'Без названия')}</span>
                                    ${examIcon}
                                </div>
                                <span class="score-pill ${getStyleForScore(avgDisplay)}">${avgDisplay}</span>
                            </div>
                            <div class="marks-box">
                                <div class="marks-row">${marksHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    subsHtml = '<div style="font-size:11px; opacity:0.4; text-align:center; padding:10px;">Нет предметов</div>';
                }
                
                const totalDisplay = s.totalAverage && s.totalAverage !== '—' ? s.totalAverage : '—';
                
                card.innerHTML = `
                    <div class="student-header">
                        <span class="student-name">
                            ${escapeHtml(s.studentName)} ${tIdx !== -1 ? crowns[tIdx] : ''}
                            <span class="abs-badge">⏳ ${absCount}</span>
                        </span>
                        <span class="score-pill ${getStyleForScore(totalDisplay)}">${totalDisplay}</span>
                    </div>
                    <div class="subs-container">${subsHtml}</div>`;
                
                // Обработчик клика на карточку студента - раскрывает список предметов
                card.onclick = (e) => {
                    e.stopPropagation();
                    const subsContainer = card.querySelector('.subs-container');
                    if (subsContainer) {
                        const wasOpen = subsContainer.classList.contains('open');
                        subsContainer.classList.toggle('open');
                        
                        // Если раскрываем предметы, и они только что открылись - показываем подсказки для экзаменов
                        if (!wasOpen && subsContainer.classList.contains('open')) {
                            const examItems = subsContainer.querySelectorAll('.sub-item.exam-subject');
                            examItems.forEach(item => {
                                const tooltipId = item.dataset.tooltip;
                                if (tooltipId) {
                                    const tooltip = document.getElementById(tooltipId);
                                    if (tooltip && !tooltip.classList.contains('open')) {
                                        tooltip.classList.add('open');
                                    }
                                }
                            });
                        }
                    }
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                };
                
                // Обработчик клика на отдельный предмет - раскрывает оценки
                card.querySelectorAll('.sub-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const marksBox = item.querySelector('.marks-box');
                        if (marksBox) marksBox.classList.toggle('open');
                    });
                });
                
                container.appendChild(card);
            });
        }
        
        // Функция для переключения подсказки по ID
        function toggleTooltip(tooltipId) {
            const tooltip = document.getElementById(tooltipId);
            if (tooltip) {
                tooltip.classList.toggle('open');
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function renderRating() {
            const container = document.getElementById('rating-list');
            if (!container) return;
            container.innerHTML = '';
            
            if (!ALL_DATA.journal || ALL_DATA.journal.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет данных для отображения</div>';
                return;
            }
            
            let filteredStudents = filterStudents(ALL_DATA.journal);
            
            const sortedAlphabet = [...filteredStudents].sort((a, b) => 
                a.studentName.localeCompare(b.studentName)
            );
            
            const sortedByScore = [...filteredStudents].sort((a, b) => {
                const avgA = parseFloat(String(a.totalAverage).replace(',', '.'));
                const avgB = parseFloat(String(b.totalAverage).replace(',', '.'));
                if (isNaN(avgA)) return 1;
                if (isNaN(avgB)) return -1;
                return avgB - avgA;
            });
            const topNames = sortedByScore.slice(0, 3).map(s => s.studentName);
            const medals = ['🥇', '🥈', '🥉'];
            
            sortedAlphabet.forEach((student, idx) => {
                const row = document.createElement('div');
                row.className = 'rating-row';
                
                const medalIndex = topNames.indexOf(student.studentName);
                const medalHtml = medalIndex !== -1 ? `<span class="medal">${medals[medalIndex]}</span>` : '';
                
                const sem1Display = student.semester1 && student.semester1 !== '—' ? student.semester1 : null;
                const sem2Display = student.semester2 && student.semester2 !== '—' ? student.semester2 : null;
                
                const avgBetween = calculateAverageBetweenSemesters(sem1Display, sem2Display);
                const avgDisplay = avgBetween || '—';
                
                row.innerHTML = `
                    <div class="rating-rank">${idx + 1}</div>
                    <div class="rating-name">
                        ${escapeHtml(student.studentName)}
                        ${medalHtml}
                    </div>
                    <div class="rating-sem1">
                        <span class="score-pill ${getStyleForScore(sem1Display)}">${sem1Display || '—'}</span>
                    </div>
                    <div class="rating-sem2">
                        <span class="score-pill ${getStyleForScore(sem2Display)}">${sem2Display || '—'}</span>
                    </div>
                    <div class="rating-avg">
                        <span class="score-pill ${getStyleForScore(avgDisplay)}">${avgDisplay}</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function forceUpdate() {
            localStorage.removeItem(CACHE_KEY);
            init(true);
        }
        
        function hideLoader() {
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                mainContent.classList.add('visible');
            }, 500);
        }
        
        function switchPage(pageId) {
            const journalPage = document.getElementById('page-journal');
            const ratingPage = document.getElementById('page-rating');
            
            if (pageId === 'journal') {
                journalPage.classList.add('active');
                ratingPage.classList.remove('active');
                renderJournal();
            } else {
                journalPage.classList.remove('active');
                ratingPage.classList.add('active');
                renderRating();
            }
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                if (btn.dataset.page === pageId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        document.getElementById('search')?.addEventListener('input', () => renderJournal());
        document.getElementById('retryButton')?.addEventListener('click', () => forceUpdate());
        document.getElementById('fabUpdate')?.addEventListener('click', () => forceUpdate());
        
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => switchPage(btn.dataset.page));
        });
        
        if (tg) {
            tg.onEvent('backButtonClicked', () => tg.close());
        }
        
        init(true);
    </script>
</body>
</html>
