<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .now-playing {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .album-art .placeholder {
            font-size: 48px;
        }

        .track-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .track-artist {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            border-radius: 30px;
            margin-top: 10px;
        }

        .playlist {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }

        .playlist-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .track-item.active {
            background: rgba(255, 255, 255, 0.25);
        }

        .track-thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .track-artist-mini {
            font-size: 12px;
            opacity: 0.7;
        }

        .settings-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .settings-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 8px;
            font-size: 14px;
        }

        .save-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .play-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="now-playing">
            <div class="album-art" id="albumArt">
                <div class="placeholder">🎵</div>
            </div>
            <div class="track-title" id="trackTitle">Выберите трек</div>
            <div class="track-artist" id="trackArtist">Нажмите на трек в списке</div>
            <audio id="audioPlayer" controls preload="auto"></audio>
        </div>

        <div class="playlist">
            <div class="playlist-title">🎧 Плейлист</div>
            <div id="playlistContainer"></div>
            
            <div class="settings-section">
                <div style="font-size: 14px; opacity: 0.9;">⚙️ Настройки</div>
                <input type="text" id="channelId" class="settings-input" placeholder="ID канала (опционально)">
                <button class="save-btn" onclick="saveChannel()">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let currentTrack = null;
        
        // Гарантированно рабочие треки (короткие, бесплатные, без CORS)
        const playlist = [
            {
                id: 1,
                title: "Calm Piano",
                artist: "Piano Music",
                url: "https://cdn.pixabay.com/download/audio/2022/05/27/audio_1c3c0f8f9a.mp3?filename=calm-piano-13576.mp3",
                thumb: "🎹"
            },
            {
                id: 2,
                title: "Soft Guitar",
                artist: "Guitar Music",
                url: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_bb61c4f3c7.mp3?filename=soft-guitar-10402.mp3",
                thumb: "🎸"
            },
            {
                id: 3,
                title: "Relaxing Nature",
                artist: "Nature Sounds",
                url: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0f1c8e6a3.mp3?filename=relaxing-nature-6893.mp3",
                thumb: "🌿"
            },
            {
                id: 4,
                title: "Meditation",
                artist: "Meditation Music",
                url: "https://cdn.pixabay.com/download/audio/2022/06/25/audio_2f9e3a7b1d.mp3?filename=meditation-14119.mp3",
                thumb: "🧘"
            },
            {
                id: 5,
                title: "Dreamy Ambient",
                artist: "Ambient Music",
                url: "https://cdn.pixabay.com/download/audio/2022/05/16/audio_8f2a6c4e1b.mp3?filename=dreamy-ambient-12457.mp3",
                thumb: "✨"
            }
        ];
        
        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            container.innerHTML = playlist.map((track, index) => `
                <div class="track-item" onclick="playTrack(${index})">
                    <div class="track-thumb">${track.thumb}</div>
                    <div class="track-info">
                        <div class="track-name">${track.title}</div>
                        <div class="track-artist-mini">${track.artist}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function playTrack(index) {
            const track = playlist[index];
            if (!track) return;
            
            currentTrack = track;
            
            document.getElementById('trackTitle').textContent = track.title;
            document.getElementById('trackArtist').textContent = track.artist;
            document.getElementById('albumArt').innerHTML = `<div class="placeholder">${track.thumb}</div>`;
            
            const audio = document.getElementById('audioPlayer');
            audio.src = track.url;
            audio.load();
            
            // Показываем уведомление
            tg.showPopup({
                title: track.title,
                message: `Сейчас играет: ${track.title} - ${track.artist}\nНажмите ▶️ для воспроизведения`,
                buttons: [{type: 'ok'}]
            });
            
            // Подсветка активного трека
            document.querySelectorAll('.track-item').forEach((item, i) => {
                if (i === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        function saveChannel() {
            const channel = document.getElementById('channelId').value.trim();
            if (channel) {
                localStorage.setItem('music_channel', channel);
                tg.showPopup({
                    title: 'Сохранено',
                    message: `Канал ${channel} сохранен`,
                    buttons: [{type: 'ok'}]
                });
            }
        }
        
        function loadSettings() {
            const saved = localStorage.getItem('music_channel');
            if (saved) {
                document.getElementById('channelId').value = saved;
            }
        }
        
        // Запуск
        renderPlaylist();
        loadSettings();
        
        // Автовоспроизведение первого трека (не автоматически, а подсказка)
        setTimeout(() => {
            tg.showPopup({
                title: "Добро пожаловать!",
                message: "Нажмите на любой трек, затем ▶️ для воспроизведения",
                buttons: [{type: 'ok'}]
            });
        }, 1000);
    </script>
</body>
</html>
