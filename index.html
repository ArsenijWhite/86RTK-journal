<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Журнал Э-24</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #f1f5f9; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; color: #1e293b; }
        .search-input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f1f5f9; }
        .student-name { font-size: 18px; font-weight: 800; margin: 0; color: #0f172a; }
        .total-badge { background: #6366f1; color: white; padding: 5px 12px; border-radius: 10px; font-weight: 900; font-size: 16px; }

        .sub-row { padding: 12px 0; border-bottom: 1px solid #f8fafc; cursor: pointer; }
        .sub-main { display: flex; justify-content: space-between; align-items: center; }
        .sub-name { font-size: 14px; font-weight: 600; color: #475569; flex: 1; padding-right: 10px; }
        .sub-avg { background: #f1f5f9; padding: 3px 10px; border-radius: 8px; font-weight: 800; font-size: 13px; }

        /* ИСПРАВЛЕННЫЕ КРУЖКИ ДЛЯ 10 */
        .marks-container { display: none; flex-wrap: wrap; gap: 8px; margin-top: 10px; padding: 10px; background: #f8fafc; border-radius: 12px; }
        .marks-container.open { display: flex; }
        .mark-pill { 
            min-width: 34px; height: 34px; padding: 0 4px;
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-size: 14px; font-weight: 800; color: white;
            box-sizing: border-box;
        }
        
        /* Цвета */
        .m-high { background: #22c55e; } .m-mid { background: #3b82f6; }
        .m-warn { background: #eab308; } .m-low { background: #ef4444; }
        
        #loader { text-align: center; margin-top: 50px; font-weight: bold; color: #6366f1; }
    </style>
</head>
<body>

    <input type="text" id="search" class="search-input" placeholder="Поиск студента...">
    <div id="loader">Загрузка данных...</div>
    <div id="content"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyc42bfeSnL3BbUOFqrU3dCa3X01GecPwIZA-LiENaR2EaUbnV06bIAyVa7Oz8J8ZUv/exec';

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';
                window.myData = data;
                render(data);
            } catch (e) {
                document.getElementById('loader').innerText = "Ошибка доступа к таблице";
            }
        }

        function getColor(m) {
            const v = parseInt(m);
            if (v >= 9) return 'm-high';
            if (v >= 7) return 'm-mid';
            if (v >= 4) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                let subs = '';
                student.subjects.forEach(s => {
                    const marks = s.marks.map(m => `<div class="mark-pill ${getColor(m)}">${m}</div>`).join('');
                    subs += `
                        <div class="sub-row" onclick="const c=this.querySelector('.marks-container'); c.classList.toggle('open')">
                            <div class="sub-main">
                                <div class="sub-name">${s.subject}</div>
                                <div class="sub-avg">${s.avg}</div>
                            </div>
                            <div class="marks-container">${marks || 'Нет оценок'}</div>
                        </div>`;
                });
                card.innerHTML = `
                    <div class="student-header">
                        <h2 class="student-name">${student.studentName}</h2>
                        <div class="total-badge">${student.totalAverage}</div>
                    </div>
                    ${subs}`;
                container.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(window.myData.filter(s => s.studentName.toLowerCase().includes(val)));
        };

        if(window.Telegram?.WebApp) window.Telegram.WebApp.expand();
        init();
    </script>
</body>
</html>
