<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Журнал Э-24</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f9; /* Мягкий серо-голубой фон */
            --card: #ffffff;
            --text-main: #1a1c1e;
            --text-muted: #8e949a;
            --accent: #007aff;
        }

        body {
            background-color: var(--bg);
            font-family: 'Manrope', sans-serif;
            margin: 0; padding: 20px;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        /* Красивая анимация загрузки */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #d1d9e0;
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header-title { font-size: 26px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.04em; }

        #search {
            width: 100%; border: none; padding: 14px 18px;
            border-radius: 16px; background: rgba(0,0,0,0.04);
            font-size: 16px; font-family: inherit; font-weight: 500;
            outline: none; box-sizing: border-box; margin-bottom: 20px;
        }

        /* Карточка студента */
        .card {
            background: var(--card); border-radius: 24px;
            padding: 20px; margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }
        .student-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .student-name { font-size: 18px; font-weight: 700; margin: 0; }
        
        /* Списки предметов (скрыты по умолчанию) */
        .subs-container { 
            display: none; margin-top: 15px; padding-top: 15px; 
            border-top: 1px solid #f0f0f2; animation: fadeIn 0.3s ease;
        }
        .subs-container.open { display: block; }

        .sub-row { padding: 12px 0; cursor: pointer; border-bottom: 1px solid #f8f8f8; }
        .sub-row:last-child { border-bottom: none; }
        
        .sub-main { display: flex; justify-content: space-between; align-items: center; }
        .sub-name { font-size: 14px; font-weight: 500; color: var(--text-muted); flex: 1; }
        
        /* Раскраска средних баллов */
        .sub-avg { 
            font-size: 13px; font-weight: 800; padding: 4px 10px; 
            border-radius: 8px; margin-left: 10px;
        }

        /* Оценки */
        .marks-container {
            display: none; flex-wrap: wrap; gap: 8px;
            margin-top: 10px; padding: 8px; background: #f9fafb; border-radius: 12px;
        }
        .marks-container.open { display: flex; }
        .no-marks { font-size: 12px; color: var(--text-muted); width: 100%; text-align: center; padding: 5px; }

        .mark-pill {
            width: 34px; height: 34px; display: flex; align-items: center; 
            justify-content: center; border-radius: 10px; font-size: 13px; font-weight: 800;
        }

        /* Цветовые схемы */
        .m-high { background: #e8f5e9; color: #2e7d32; }
        .m-mid  { background: #e3f2fd; color: #1565c0; }
        .m-warn { background: #fff8e1; color: #f9a825; }
        .m-low  { background: #ffebee; color: #c62828; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-weight: 600; color: #8e949a;">Загружаем журнал...</div>
    </div>

    <div class="header-title">Успеваемость</div>
    <input type="text" id="search" placeholder="Поиск студента">

    <div id="content"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyc42bfeSnL3BbUOFqrU3dCa3X01GecPwIZA-LiENaR2EaUbnV06bIAyVa7Oz8J8ZUv/exec';
        let allData = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                document.getElementById('loader').style.display = 'none';
                render(allData);
            } catch (e) {
                document.getElementById('loader').innerHTML = "<div style='color:red'>Ошибка сети</div>";
            }
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (v >= 9 || v === 5) return 'm-high';
            if (v >= 7 || v === 4) return 'm-mid';
            if (v >= 4 || v === 3) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let subsHtml = student.subjects.map(s => {
                    const marks = Array.isArray(s.marks) ? s.marks : [];
                    const marksHtml = marks.length > 0 
                        ? marks.map(m => `<div class="mark-pill ${getStyle(m)}">${m}</div>`).join('')
                        : `<div class="no-marks">Нет отметок</div>`;

                    return `
                        <div class="sub-row" onclick="event.stopPropagation(); this.querySelector('.marks-container').classList.toggle('open')">
                            <div class="sub-main">
                                <span class="sub-name">${s.subject}</span>
                                <span class="sub-avg ${getStyle(s.avg)}">${s.avg}</span>
                            </div>
                            <div class="marks-container">${marksHtml}</div>
                        </div>`;
                }).join('');

                card.onclick = () => card.querySelector('.subs-container').classList.toggle('open');

                card.innerHTML = `
                    <div class="student-header">
                        <h2 class="student-name">${student.studentName}</h2>
                        <div class="sub-avg ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">
                        ${subsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(allData.filter(s => s.studentName.toLowerCase().includes(val)));
        };

        if(window.Telegram?.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }
        init();
    </script>
</body>
</html>
