<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8; --gold: #fbbf24; }
        * { font-family: -apple-system, BlinkMacSystemFont, sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 80px; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .logo-outline { width: 80px; height: 80px; border: 3px solid rgba(56,189,248,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #main-content { opacity: 0; transition: 0.5s; }
        #search { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 20px; outline: none; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .score-pill { padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 12px; }
        .m-low { background: #ef4444; } .m-warn { background: #f59e0b; } .m-high { background: #10b981; } .m-gold { background: var(--gold); color: #000; } .m-none { background: rgba(255,255,255,0.1); }
        .subs-container { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .subs-container.open { display: block; }
        .mark { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 800; margin: 2px; }
        .fab-update { position: fixed; bottom: 25px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>
    <div id="loader"><div class="logo-outline"></div><div style="color:var(--accent); font-size:12px;">ЗАГРУЗКА...</div></div>
    <div id="main-content">
        <h2 style="margin:0 0 15px 0;">Журнал 86РТК</h2>
        <input type="text" id="search" placeholder="Поиск по фамилии...">
        <div id="list"></div>
    </div>
    <div class="fab-update" onclick="forceUpdate()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </div>

    <script>
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbzKa6oy63MTEIrKEh8ghNYt7fP6bDnhxXlldgpo7FiNbbz_a4njlMP1cFKCYfLTNbo/exec';
        const API_ABSENCES = 'https://script.google.com/macros/s/AKfycbwjh11bIROjdQIWt2_N6Byvy-O6es0WRZGezl7RVUFHqTEclYuLnRU5LqmzyZqCpIIVzw/exec';
        let ALL_DATA = { journal: [], absences: {} };

        window.onload = () => { loadData(); };

        async function loadData() {
            try {
                const ts = Date.now();
                const [resJ, resA] = await Promise.all([
                    fetch(API_JOURNAL + '?t=' + Date.now()) 
                    fetch(API_ABSENCES + '?t=' + Date.now()) 
                ]);
                ALL_DATA.journal = Array.isArray(resJ) ? resJ : [];
                ALL_DATA.absences = {};
                if (Array.isArray(resA)) resA.forEach(i => ALL_DATA.absences[i.name] = i.count);
                render(ALL_DATA.journal);
                hideLoader();
            } catch (e) { 
                console.error(e); 
                alert("Ошибка получения данных. Проверьте публикацию скрипта.");
                hideLoader();
            }
        }

        function render(data) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                const abs = ALL_DATA.absences[s.studentName] || "0";
                div.innerHTML = `
                    <div class="student-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <div><b>${s.studentName}</b><br><small style="color:var(--muted)">Отгулы: ${abs}</small></div>
                        <div class="score-pill ${getStyle(s.totalAverage)}">${s.totalAverage}</div>
                    </div>
                    <div class="subs-container">
                        ${s.subjects.map(sub => `
                            <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;">
                                <span>${sub.subject}</span><span class="score-pill ${getStyle(sub.avg)}" style="scale:0.8">${sub.avg}</span>
                            </div>
                            <div style="margin-bottom:10px;">${sub.marks.map(m => `<span class="mark ${getStyle(m)}">${m}</span>`).join('')}</div>
                        `).join('')}
                    </div>`;
                list.appendChild(div);
            });
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold';
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }

        function forceUpdate() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').style.opacity = '1';
            loadData();
        }

        function hideLoader() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('main-content').style.opacity = '1'; }, 500);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(ALL_DATA.journal.filter(s => s.studentName.toLowerCase().includes(val)));
        });
    </script>
</body>
</html>
