<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Журнал</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-4 text-center">Журнал Группы</h1>
        <div id="loader" class="text-center">Загрузка оценок...</div>
        <div id="content" class="space-y-4"></div>
    </div>

    <script>
        const API_URL = 'ВАШ_URL_ИЗ_ШАГА_1';

        async function loadGrades() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('content');
                document.getElementById('loader').classList.add('hidden');

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-200";
                    card.innerHTML = `
                        <h2 class="font-bold text-lg text-blue-600">${item.studentName}</h2>
                        <p class="text-sm text-gray-500 text-right">Ср. балл: ${item.average[1] || '—'}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loader').innerText = "Ошибка загрузки";
            }
        }
        loadGrades();
    </script>
</body>
</html>
