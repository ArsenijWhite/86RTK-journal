<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал Э-24</title>
    <!-- SDK Telegram -->
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #2d3735; 
            --card: #3a4744;
            --accent: #10b981;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        html, body {
            background-color: var(--bg) !important;
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body { padding: 20px; box-sizing: border-box; }

        /* ЛИНЕЙНЫЙ ЛОАДЕР */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); z-index: 1000; transition: opacity 0.5s ease;
        }

        .loader-text {
            font-size: 12px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.15em;
            margin-bottom: 24px; text-align: center; padding: 0 20px;
        }

        .progress-container {
            width: 160px; height: 3px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; position: relative;
        }

        .progress-bar {
            width: 80px; height: 100%; background: var(--accent);
            border-radius: 10px; position: absolute;
            animation: slideLine 1.5s infinite ease-in-out;
            box-shadow: 0 0 12px var(--accent);
        }

        @keyframes slideLine {
            0% { left: -80px; }
            50% { left: 160px; }
            100% { left: -80px; }
        }

        /* КОНТЕНТ */
        #main-content { opacity: 0; transform: translateY(15px); transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); display: none; }
        #main-content.visible { opacity: 1; transform: translateY(0); display: block; }

        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 24px; color: #fff; letter-spacing: -0.04em; }

        #search {
            width: 100%; border: none; padding: 18px 22px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.08); color: #fff;
            font-size: 16px; margin-bottom: 24px; outline: none; box-sizing: border-box;
            transition: background 0.3s;
        }
        #search:focus { background: rgba(255, 255, 255, 0.12); }

        .card {
            background: var(--card); border-radius: 30px; padding: 24px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .student-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .score-pill { font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 12px; min-width: 38px; text-align: center; }

        .m-high { background: #065f46; color: #a7f3d0; }
        .m-mid  { background: #1e3a8a; color: #bfdbfe; }
        .m-warn { background: #78350f; color: #fef08a; }
        .m-low  { background: #7f1d1d; color: #fecaca; }

        .subs-container { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }
        .subs-container.open { display: block; animation: slideIn 0.4s ease; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body>

    <!-- Лоадер -->
    <div id="loader">
        <div class="loader-text" id="status-text">Инициализация</div>
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
    </div>

    <!-- Контент -->
    <div id="main-content">
        <div class="header-title">Журнал группы</div>
        <input type="text" id="search" placeholder="Поиск по фамилии...">
        <div id="content"></div>
    </div>

    <script>
        // === ВСТАВЬ СВОЮ ССЫЛКУ СЮДА ===
        const API_URL = 'https://script.google.com/macros/s/AKfycbxJjvvps-faFyjFwm8tED8OhYQFCLl6UwyRQfIJEGLLa9Hpq_cMVUIDB1LY-qLJgxrV/exec'; 

        const tg = window.Telegram?.WebApp;

        function setupApp() {
            if (tg) {
                tg.ready();
                tg.expand();
                tg.headerColor = '#2d3735';
                tg.backgroundColor = '#2d3735';
                // Принудительное расширение
                setTimeout(() => tg.expand(), 500);
            }
        }

        async function init() {
            setupApp();
            const statusText = document.getElementById('status-text');
            const pBar = document.getElementById('p-bar');

            try {
                statusText.innerText = "Подключение к таблице...";
                const res = await fetch(API_URL);
                
                if (!res.ok) throw new Error("Код: " + res.status);
                
                const data = await res.json();
                
                if (data.error) throw new Error("Таблица: " + data.error);

                statusText.innerText = "Данные получены";
                
                const loader = document.getElementById('loader');
                const main = document.getElementById('main-content');
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        main.classList.add('visible');
                        render(data);
                    }, 500);
                }, 300);

            } catch (e) {
                statusText.innerText = "Ошибка: " + e.message;
                statusText.style.color = "#f87171";
                pBar.style.background = "#f87171";
                pBar.style.animation = "none";
                pBar.style.width = "100%";
                pBar.style.left = "0";
            }
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (v >= 9 || v === 5) return 'm-high';
            if (v >= 7 || v === 4) return 'm-mid';
            if (v >= 4 || v === 3) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => card.querySelector('.subs-container').classList.toggle('open');
                
                let subs = student.subjects.map(s => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.03)">
                        <span style="font-size:14px; color:var(--muted); font-weight:500;">${s.subject}</span>
                        <span class="score-pill ${getStyle(s.avg)}">${s.avg}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="student-header">
                        <span style="font-weight:700; font-size:20px; color:#fff;">${student.studentName}</span>
                        <div class="score-pill ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">${subs}</div>
                `;
                container.appendChild(card);
            });
        }

        // Поиск
        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const name = card.querySelector('span').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'block' : 'none';
            });
        };

        // Запуск
        init();

        // Лайфхак для FullScreen при первом тапе
        document.addEventListener('touchstart', () => { if(tg && !tg.isExpanded) tg.expand(); }, {passive: true});
    </script>
</body>
</html>
