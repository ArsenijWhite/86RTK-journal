<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <!-- Правильное подключение Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --error: #ef4444;
            --gold: #fbbf24;
        }
        * { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            box-sizing: border-box; 
        }
        html, body { 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text); 
            min-height: 100vh; 
        }
        body { 
            padding: 20px; 
            padding-bottom: 50px; 
        }

        /* ЛОАДЕР */
        #loader { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .logo-container { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 25px; 
        }
        
        .logo-outline {
            position: absolute; 
            width: 100%; 
            height: 100%;
            border-radius: 50%; 
            border: 2px solid rgba(56, 189, 248, 0.1);
            border-top: 2px solid var(--accent);
            box-shadow: 0 -5px 15px rgba(56, 189, 248, 0.3);
            animation: spin 1.5s linear infinite;
        }
        .logo-icon {
            width: 45px; 
            height: 60px; 
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border-radius: 5px 12px 12px 5px; 
            position: relative; 
            z-index: 2;
            animation: pulse-inner 2s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .logo-icon::before {
            content: ""; 
            position: absolute; 
            top: 12px; 
            left: 8px;
            width: 25px; 
            height: 3px; 
            background: rgba(255,255,255,0.4);
            border-radius: 2px; 
            box-shadow: 0 8px 0 rgba(255,255,255,0.4), 0 16px 0 rgba(255,255,255,0.4);
        }
        .loader-text { 
            font-size: 10px; 
            font-weight: 700; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 0.4em; 
            margin-bottom: 35px; 
            animation: glow-text 2s infinite ease-in-out; 
        }
        .copyright { 
            font-size: 9px; 
            font-weight: 500; 
            color: rgba(255,255,255,0.1); 
            margin-top: 15px; 
            letter-spacing: 1px; 
        }
        .error-text {
            font-size: 12px;
            color: #ef4444;
            margin-top: 20px;
            text-align: center;
            max-width: 80%;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-inner { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes glow-text { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ИНТЕРФЕЙС */
        #main-content { 
            opacity: 0; 
            transition: 0.5s; 
            display: none;
        }
        #main-content.visible {
            display: block;
            opacity: 1;
        }
        .header-title { 
            font-size: 22px; 
            font-weight: 800; 
            margin-bottom: 5px; 
        }
        .header-sub { 
            font-size: 12px; 
            color: var(--muted); 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        #search { 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px 18px; 
            border-radius: 15px; 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            margin-bottom: 20px; 
            transition: 0.3s; 
        }
        #search:focus { 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.08); 
        }
        #search::placeholder {
            color: var(--muted);
        }

        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .card:active { 
            transform: scale(0.98); 
            background: #2d3a4f; 
        }
        .student-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .student-name { 
            font-size: 16px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        .abs-badge { 
            font-size: 10px; 
            font-weight: 800; 
            padding: 2px 8px; 
            border-radius: 6px; 
            background: rgba(255,255,255,0.05); 
            color: var(--muted); 
            border: 1px solid rgba(255,255,255,0.03); 
        }

        .score-pill { 
            font-size: 11px; 
            font-weight: 800; 
            padding: 4px 10px; 
            border-radius: 8px; 
            min-width: 38px; 
            text-align: center; 
        }
        .m-low { background: #ef4444; color: white; } 
        .m-warn { background: #f59e0b; color: white; } 
        .m-high { background: #10b981; color: white; }
        .m-gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .m-none { background: rgba(255,255,255,0.1); color: var(--muted); }

        .subs-container { 
            display: none; 
            padding-top: 15px; 
            margin-top: 15px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }
        .subs-container.open { 
            display: block; 
        }
        .sub-item { 
            margin-bottom: 12px; 
            cursor: pointer;
        }
        .sub-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 8px; 
        }
        .marks-box { 
            display: none; 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 12px; 
            margin-top: 5px; 
            flex-direction: column; 
            gap: 8px; 
        }
        .marks-box.open { 
            display: flex; 
        }
        .marks-row { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 4px; 
        }
        .mark { 
            width: 26px; 
            height: 26px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: 800; 
        }
        .analytic-tip { 
            font-size: 9px; 
            color: var(--accent); 
            font-weight: 700; 
            text-transform: uppercase; 
            background: rgba(56, 189, 248, 0.1); 
            padding: 4px 8px; 
            border-radius: 6px; 
            align-self: flex-start; 
        }

        .fab-update { 
            position: fixed; 
            bottom: 25px; 
            right: 20px; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.2); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 999; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fab-update:active {
            transform: scale(0.92);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }
        
        .retry-btn {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: var(--bg);
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text" id="loaderText">Загрузка данных...</div>
        <div class="logo-container">
            <div class="logo-outline"></div>
            <div class="logo-icon"></div>
        </div>
        <div class="copyright">by @skwared</div>
        <div id="loaderError" style="display: none;"></div>
    </div>

    <div id="main-content">
        <div class="header-title">📚 Журнал 86РТК</div>
        <div class="header-sub">Электронный журнал успеваемости</div>
        <input type="text" id="search" placeholder="🔍 Поиск по фамилии..." autocomplete="off">
        <div id="list"></div>
    </div>

    <div class="fab-update" onclick="forceUpdate()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                tg.setHeaderColor('#0f172a');
                tg.setBackgroundColor('#0f172a');
                tg.enableClosingConfirmation();
            }
        } catch(e) {
            console.log('Telegram WebApp не доступен:', e);
        }
        
        // Конфигурация API
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbzrbDXKkZhKJohza3bbsUF1eoDb9WbLcdfdfheog9cpsPpVHrScR0qb2TVc9JTGtN0b/exec';
        const API_ABSENCES = 'https://script.google.com/macros/s/AKfycbyux4wfN_lVoodDq-JHHjbYAGuJys_DsZ2mADyUGdw1MERG-iZK833dN0tSzI7lq_QeZg/exec';
        
        let ALL_DATA = { journal: [], absences: {} };
        let isLoading = false;
        
        // Функция для стилизации оценок
        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold'; 
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }
        
        // Расчет необходимых оценок
        function calcNeed(currentAvg, marks) {
            if (!marks || marks.length === 0) return null;
            let avg = parseFloat(String(currentAvg).replace(',', '.'));
            if (isNaN(avg) || avg >= 10) return null;
            let decimal = avg - Math.floor(avg);
            if (decimal >= 0.29 && decimal <= 0.51) {
                let target = Math.ceil(avg + 0.001);
                let sum = marks.reduce((a, b) => a + (parseFloat(String(b).replace(',','.')) || 0), 0);
                for (let i = 1; i <= 10; i++) {
                    if ((sum + i * 10) / (marks.length + i) >= target) {
                        return `Нужно ${i} отм. (10) до ${target}.0`;
                    }
                }
            }
            return null;
        }
        
        // Основная функция загрузки данных
        async function init(force = false) {
            if (isLoading) return;
            isLoading = true;
            
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const loaderError = document.getElementById('loaderError');
            
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            loaderError.style.display = 'none';
            loaderText.textContent = 'Загрузка данных...';
            
            // Проверяем кэш
            const cached = localStorage.getItem('journal_blue_v6');
            if (!force && cached) {
                try {
                    ALL_DATA = JSON.parse(cached);
                    if (ALL_DATA.journal && ALL_DATA.journal.length > 0) {
                        render();
                        hideLoader();
                        isLoading = false;
                        return;
                    }
                } catch(e) {}
            }
            
            try {
                loaderText.textContent = 'Загрузка журнала...';
                
                // Загрузка данных с таймаутом
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const [resJ, resA] = await Promise.all([
                    fetch(API_JOURNAL, { signal: controller.signal }).then(r => r.json()),
                    fetch(API_ABSENCES, { signal: controller.signal }).then(r => r.json())
                ]);
                
                clearTimeout(timeoutId);
                
                // Обработка пропусков
                const absMap = {};
                if (Array.isArray(resA)) {
                    resA.forEach(a => { 
                        if (a && a.name) absMap[a.name.trim()] = a.count || "0"; 
                    });
                }
                
                // Обработка журнала
                let journalData = [];
                if (Array.isArray(resJ)) {
                    journalData = resJ;
                } else if (resJ && resJ.journal && Array.isArray(resJ.journal)) {
                    journalData = resJ.journal;
                }
                
                if (!journalData.length) {
                    throw new Error('Нет данных в журнале');
                }
                
                ALL_DATA = { 
                    journal: journalData, 
                    absences: absMap 
                };
                
                localStorage.setItem('journal_blue_v6', JSON.stringify(ALL_DATA));
                render();
                hideLoader();
                
                // Виброотклик при успешной загрузке
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
                
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                loaderText.textContent = 'Ошибка соединения';
                loaderError.style.display = 'block';
                loaderError.innerHTML = `<div class="error-text">Не удалось загрузить данные<br>Проверьте подключение к интернету</div>
                                        <button class="retry-btn" onclick="forceUpdate()">🔄 Повторить</button>`;
                
                // Если есть кэш, показываем его даже при ошибке
                if (ALL_DATA.journal && ALL_DATA.journal.length > 0) {
                    loaderText.textContent = 'Использую сохраненные данные';
                    setTimeout(() => {
                        render();
                        hideLoader();
                    }, 1000);
                }
            } finally {
                isLoading = false;
            }
        }
        
        // Рендер списка студентов
        function render() {
            const container = document.getElementById('list');
            if (!container) return;
            
            container.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase().trim();
            
            if (!ALL_DATA.journal || ALL_DATA.journal.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет данных для отображения</div>';
                return;
            }
            
            // Вычисление топ-3 по среднему баллу
            const sortedByScore = [...ALL_DATA.journal].sort((a,b) => {
                const avgA = parseFloat(String(a.totalAverage).replace(',', '.'));
                const avgB = parseFloat(String(b.totalAverage).replace(',', '.'));
                return avgB - avgA;
            });
            const topNames = sortedByScore.slice(0, 3).map(s => s.studentName);
            const crowns = ['🥇', '🥈', '🥉'];
            
            // Фильтрация и сортировка
            const list = ALL_DATA.journal
                .filter(s => s && s.studentName && s.studentName.toLowerCase().includes(query))
                .sort((a, b) => a.studentName.localeCompare(b.studentName));
            
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">👨‍🎓 Ничего не найдено</div>';
                return;
            }
            
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                const absCount = ALL_DATA.absences[s.studentName] || "0";
                const tIdx = topNames.indexOf(s.studentName);
                
                let subsHtml = '';
                if (s.subjects && Array.isArray(s.subjects)) {
                    subsHtml = s.subjects.map(sub => {
                        const tip = calcNeed(sub.avg, sub.marks);
                        const marksHtml = (sub.marks && Array.isArray(sub.marks)) 
                            ? sub.marks.map(m => `<div class="mark ${getStyle(m)}">${m}</div>`).join('')
                            : '<div class="empty-state" style="font-size:10px">Нет оценок</div>';
                        
                        return `<div class="sub-item" onclick="event.stopPropagation(); this.querySelector('.marks-box').classList.toggle('open');">
                            <div class="sub-row">
                                <span>${sub.subject || 'Без названия'}</span>
                                <span class="score-pill ${getStyle(sub.avg)}">${sub.avg || '—'}</span>
                            </div>
                            <div class="marks-box">
                                ${tip ? `<div class="analytic-tip">💡 ${tip}</div>` : ''}
                                <div class="marks-row">${marksHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    subsHtml = '<div style="font-size:11px; opacity:0.5; text-align:center; padding:10px;">Нет предметов</div>';
                }
                
                card.innerHTML = `
                    <div class="student-header">
                        <span class="student-name">
                            ${escapeHtml(s.studentName)} ${tIdx !== -1 ? crowns[tIdx] : ''}
                            <span class="abs-badge">⏳ ${absCount}</span>
                        </span>
                        <span class="score-pill ${getStyle(s.totalAverage)}">${s.totalAverage || '—'}</span>
                    </div>
                    <div class="subs-container">${subsHtml}</div>`;
                
                card.onclick = (e) => {
                    e.stopPropagation();
                    const subsContainer = card.querySelector('.subs-container');
                    if (subsContainer) {
                        subsContainer.classList.toggle('open');
                    }
                    if (tg && tg.HapticFeedback) {
                        tg.HapticFeedback.impactOccurred('light');
                    }
                };
                
                container.appendChild(card);
            });
        }
        
        // Защита от XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Принудительное обновление
        function forceUpdate() {
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            localStorage.removeItem('journal_blue_v6');
            init(true);
        }
        
        // Скрытие лоадера
        function hideLoader() {
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');
            
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                mainContent.classList.add('visible');
            }, 500);
        }
        
        // Обработчик поиска
        if (document.getElementById('search')) {
            document.getElementById('search').addEventListener('input', () => {
                render();
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            });
        }
        
        // Обработка жеста назад в Telegram
        if (tg) {
            tg.onEvent('backButtonClicked', () => {
                tg.close();
            });
        }
        
        // Запуск приложения
        init();
        
        // Экспорт функций для глобального доступа
        window.forceUpdate = forceUpdate;
    </script>
</body>
</html>
