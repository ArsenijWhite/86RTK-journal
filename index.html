<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал Э-24</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #2d3735; 
            --card: #3a4744;
            --accent: #10b981;
            --skeleton: rgba(255, 255, 255, 0.05);
        }

        html, body {
            background-color: var(--bg) !important;
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: #e2e8f0; letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body { padding: 20px; box-sizing: border-box; }

        /* КРУТОЙ ЭФФЕКТ ЗАГРУЗКИ (SKELETON) */
        #loader {
            position: fixed; top: 80px; left: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 15px;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .skeleton-card {
            height: 80px; background: var(--card); border-radius: 24px;
            position: relative; overflow: hidden;
        }

        .skeleton-card::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: wave 1.5s infinite;
        }

        @keyframes wave {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Основной контент */
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 24px; }
        #search {
            width: 100%; border: none; padding: 16px; border-radius: 18px;
            background: rgba(255, 255, 255, 0.07); color: white;
            font-size: 16px; margin-bottom: 24px; outline: none; box-sizing: border-box;
        }

        .card {
            background: var(--card); border-radius: 28px; padding: 22px; margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }
        
        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .score-pill { font-size: 13px; font-weight: 800; padding: 5px 12px; border-radius: 10px; }

        /* Цвета оценок */
        .m-high { background: #065f46; color: #a7f3d0; }
        .m-mid  { background: #1e3a8a; color: #bfdbfe; }
        .m-warn { background: #78350f; color: #fef08a; }
        .m-low  { background: #7f1d1d; color: #fecaca; }

        .subs-container { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .subs-container.open { display: block; }
        .sub-row { padding: 12px 0; display: flex; justify-content: space-between; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Скелетная загрузка -->
    <div id="loader">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card" style="height: 120px"></div>
        <div class="skeleton-card"></div>
    </div>

    <div id="main-content" class="hidden">
        <div class="header-title">Журнал</div>
        <input type="text" id="search" placeholder="Поиск фамилии...">
        <div id="content"></div>
    </div>

    <script>
        const API_URL = 'ВАША_ССЫЛКА_EXEC';
        const tg = window.Telegram.WebApp;

        // ФОРСИРОВАННЫЙ ПОЛНЫЙ ЭКРАН
        function expandApp() {
            tg.ready();
            tg.expand();
            if (tg.requestFullscreen) tg.requestFullscreen(); // Для новых версий
        }

        async function init() {
            expandApp();
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Плавный переход от лоадера к контенту
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    render(data);
                }, 400);

            } catch (e) {
                document.getElementById('loader').innerHTML = "Ошибка сети";
            }
        }

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (v >= 9 || v === 5) return 'm-high';
            if (v >= 7 || v === 4) return 'm-mid';
            if (v >= 4 || v === 3) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => card.querySelector('.subs-container').classList.toggle('open');
                
                let subs = student.subjects.map(s => `
                    <div class="sub-row">
                        <span style="font-size:14px; opacity:0.7">${s.subject}</span>
                        <span class="score-pill ${getStyle(s.avg)}">${s.avg}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="student-header">
                        <span style="font-weight:700; font-size:18px">${student.studentName}</span>
                        <div class="score-pill ${getStyle(student.totalAverage)}">${student.totalAverage}</div>
                    </div>
                    <div class="subs-container">${subs}</div>
                `;
                container.appendChild(card);
            });
        }

        expandApp();
        init();
        
        // Повторный вызов расширения при любом клике (лайфхак для браузеров)
        document.body.addEventListener('click', () => { if (!tg.isExpanded) tg.expand(); });
    </script>
</body>
</html>
