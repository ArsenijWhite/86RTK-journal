<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org"></script>
    <!-- Подключаем шрифт Manrope — он выглядит очень современно и дорого -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --card: #ffffff;
            --text-main: #1a1c1e;
            --text-muted: #6c727a;
            --accent: #007aff; /* Apple Blue */
        }

        body {
            background-color: var(--bg);
            font-family: 'Manrope', -apple-system, sans-serif;
            margin: 0; padding: 20px;
            color: var(--text-main);
            letter-spacing: -0.02em; /* Делает шрифт более плотным и дорогим */
        }

        /* Заголовок */
        .header-title {
            font-size: 28px; font-weight: 800;
            margin-bottom: 24px; color: var(--text-main);
            letter-spacing: -0.04em;
        }

        /* Поиск в стиле iOS */
        #search {
            width: 100%; border: none; padding: 14px 18px;
            border-radius: 14px; background: #f1f2f4;
            font-size: 16px; font-family: inherit; font-weight: 500;
            outline: none; box-sizing: border-box; margin-bottom: 25px;
        }

        /* Карточка */
        .card {
            background: var(--card); border-radius: 28px;
            padding: 24px; margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f2;
        }
        .student-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .student-name { font-size: 20px; font-weight: 700; margin: 0; letter-spacing: -0.03em; }
        .total-badge {
            font-size: 20px; font-weight: 800; color: var(--accent);
        }

        /* Предметы */
        .sub-row {
            padding: 16px 0; border-top: 1px solid #f5f5f7;
            cursor: pointer;
        }
        .sub-main { display: flex; justify-content: space-between; align-items: center; }
        .sub-name { font-size: 15px; font-weight: 500; color: var(--text-muted); flex: 1; }
        .sub-avg { font-size: 15px; font-weight: 700; color: var(--text-main); }

        /* Оценки в стиле плиток Apple */
        .marks-container {
            display: none; flex-wrap: wrap; gap: 8px;
            margin-top: 12px; padding: 4px;
        }
        .marks-container.open { display: flex; }
        
        .mark-pill {
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 14px; font-weight: 800;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mark-pill:active { transform: scale(0.9); }

        /* Мягкая пастельная палитра для оценок */
        .m-high { background: #e8f5e9; color: #2e7d32; } /* 9-10 */
        .m-mid  { background: #e3f2fd; color: #1565c0; } /* 7-8 */
        .m-warn { background: #fff8e1; color: #f9a825; } /* 4-6 */
        .m-low  { background: #ffebee; color: #c62828; } /* 1-3 */

        #loader { font-weight: 600; color: var(--text-muted); text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header-title">Группа Э-24</div>
    <input type="text" id="search" placeholder="Поиск">

    <div id="loader">Загрузка данных...</div>
    <div id="content"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyc42bfeSnL3BbUOFqrU3dCa3X01GecPwIZA-LiENaR2EaUbnV06bIAyVa7Oz8J8ZUv/exec';
        let allData = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                document.getElementById('loader').style.display = 'none';
                render(allData);
            } catch (e) {
                document.getElementById('loader').innerText = "Ошибка подключения";
            }
        }

        function getMarkColor(m) {
            const v = parseInt(m);
            if (v >= 9) return 'm-high';
            if (v >= 7) return 'm-mid';
            if (v >= 4) return 'm-warn';
            return 'm-low';
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'card';
                let subs = '';
                student.subjects.forEach(s => {
                    const marks = s.marks.map(m => `<div class="mark-pill ${getMarkColor(m)}">${m}</div>`).join('');
                    subs += `
                        <div class="sub-row" onclick="const c=this.querySelector('.marks-container'); c.classList.toggle('open')">
                            <div class="sub-main">
                                <span class="sub-name">${s.subject}</span>
                                <span class="sub-avg">${s.avg}</span>
                            </div>
                            <div class="marks-container">${marks}</div>
                        </div>`;
                });
                card.innerHTML = `
                    <div class="student-header">
                        <h2 class="student-name">${student.studentName}</h2>
                        <div class="total-badge">${student.totalAverage}</div>
                    </div>
                    ${subs}`;
                container.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(allData.filter(s => s.studentName.toLowerCase().includes(val)));
        };

        if(window.Telegram?.WebApp) window.Telegram.WebApp.expand();
        init();
    </script>
</body>
</html>
