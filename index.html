<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --error: #ef4444;
            --gold: #fbbf24;
            --sem1: #3b82f6;
            --sem2: #10b981;
        }
        * { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            box-sizing: border-box; 
        }
        html, body { 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text); 
            min-height: 100vh; 
        }
        body { 
            padding: 20px; 
            padding-bottom: 80px; 
        }

        /* ЛОАДЕР (оставляем как есть) */
        #loader { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .loader-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }
        
        .logo-container { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 30px; 
        }
        
        .logo-outline {
            position: absolute; 
            width: 100%; 
            height: 100%;
            border-radius: 50%; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        #loader:not(.error-mode) .logo-container {
            animation: breatheContainer 2s ease-in-out infinite;
        }
        
        #loader:not(.error-mode) .logo-outline {
            border: 2px solid rgba(56, 189, 248, 0.15);
            border-top: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            animation: spin 1.2s linear infinite;
        }
        
        #loader:not(.error-mode) .logo-icon {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            animation: breatheIcon 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }
        
        #loader.error-mode .logo-outline {
            border: 2px solid var(--error);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: none;
        }
        
        #loader.error-mode .logo-icon {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: breatheIconError 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        
        .logo-icon {
            width: 45px; 
            height: 60px; 
            border-radius: 5px 12px 12px 5px; 
            position: relative; 
            z-index: 2;
        }
        
        .logo-icon::before {
            content: ""; 
            position: absolute; 
            top: 12px; 
            left: 8px;
            width: 25px; 
            height: 3px; 
            background: rgba(255,255,255,0.5);
            border-radius: 2px; 
            box-shadow: 0 8px 0 rgba(255,255,255,0.5), 0 16px 0 rgba(255,255,255,0.5);
        }
        
        .loader-status { 
            font-size: 11px; 
            font-weight: 600; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 0.3em; 
            margin-bottom: 25px;
        }
        
        .error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
            max-width: 280px;
        }
        
        .error-container.visible {
            display: flex;
        }
        
        .error-message {
            font-size: 13px;
            font-weight: 500;
            color: var(--error);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .retry-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 28px;
            border-radius: 30px;
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
        
        .copyright {
            position: absolute;
            bottom: 25px;
            font-size: 9px;
            color: rgba(255,255,255,0.08);
        }

        @keyframes breatheContainer {
            0% { transform: scale(0.98); }
            50% { transform: scale(1.02); }
            100% { transform: scale(0.98); }
        }
        
        @keyframes breatheIcon {
            0% { transform: scale(0.97); opacity: 0.85; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(0.97); opacity: 0.85; }
        }
        
        @keyframes breatheIconError {
            0% { transform: scale(0.97); opacity: 0.85; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(0.97); opacity: 0.85; }
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* ИНТЕРФЕЙС */
        #main-content { 
            opacity: 0; 
            transition: 0.5s; 
            display: none;
        }
        #main-content.visible {
            display: block;
            opacity: 1;
        }
        
        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
            box-shadow: 0 2px 8px rgba(56, 189, 248, 0.3);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .mini-journal-icon {
            width: 28px;
            height: 36px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border-radius: 3px 8px 8px 3px;
            position: relative;
            display: inline-block;
        }
        
        .mini-journal-icon::before {
            content: "";
            position: absolute;
            top: 7px;
            left: 5px;
            width: 18px;
            height: 2px;
            background: rgba(255,255,255,0.6);
            border-radius: 1px;
            box-shadow: 0 7px 0 rgba(255,255,255,0.6), 0 14px 0 rgba(255,255,255,0.6);
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
        }
        
        .header-sub { 
            font-size: 12px; 
            color: var(--muted); 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        #search { 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.08); 
            padding: 14px 18px; 
            border-radius: 16px; 
            background: rgba(255,255,255,0.04); 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            margin-bottom: 20px; 
        }
        #search:focus { 
            border-color: var(--accent); 
        }
        
        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer;
        }
        .card:active { 
            transform: scale(0.98); 
        }
        .student-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .student-name { 
            font-size: 16px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        
        .abs-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.04);
            color: var(--muted);
        }
        
        .score-pill { 
            font-size: 12px; 
            font-weight: 700; 
            padding: 4px 10px; 
            border-radius: 8px; 
            min-width: 42px; 
            text-align: center; 
        }
        .m-low { background: #ef4444; color: white; } 
        .m-warn { background: #f59e0b; color: white; } 
        .m-high { background: #10b981; color: white; }
        .m-gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; }
        .m-none { background: rgba(255,255,255,0.08); color: var(--muted); }
        
        /* ТАБЛИЦА РЕЙТИНГА */
        .rating-table {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .rating-header {
            display: grid;
            grid-template-columns: 40px 1fr 80px 80px 90px;
            background: rgba(56, 189, 248, 0.1);
            padding: 14px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .rating-row {
            display: grid;
            grid-template-columns: 40px 1fr 80px 80px 90px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
        }
        
        .rating-row:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .rating-rank {
            font-weight: 700;
            color: var(--gold);
            text-align: center;
        }
        
        .rating-name {
            font-weight: 500;
            font-size: 14px;
        }
        
        .rating-sem1, .rating-sem2, .rating-avg {
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .rating-sem1 { color: var(--sem1); }
        .rating-sem2 { color: var(--sem2); }
        .rating-avg { color: var(--gold); }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--muted);
            font-size: 14px;
        }
        
        .subs-container { 
            display: none; 
            padding-top: 15px; 
            margin-top: 15px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }
        .subs-container.open { display: block; }
        .sub-item { margin-bottom: 14px; cursor: pointer; }
        .sub-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .marks-box { display: none; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 12px; margin-top: 8px; }
        .marks-box.open { display: block; }
        .marks-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .mark { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; font-weight: 700; margin-right: 4px; }
        .analytic-tip { font-size: 10px; color: var(--accent); background: rgba(56, 189, 248, 0.1); padding: 6px 10px; border-radius: 8px; margin-bottom: 8px; display: inline-block; }
        
        .fab-update { 
            position: fixed; 
            bottom: 25px; 
            right: 20px; 
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            background: rgba(30, 41, 59, 0.85); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 999; 
            cursor: pointer;
        }
        .fab-update:active { transform: scale(0.92); }
        
        .footer-signature {
            text-align: center;
            padding: 30px 20px 20px;
            color: rgba(255,255,255,0.1);
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-inner">
            <div class="logo-container">
                <div class="logo-outline"></div>
                <div class="logo-icon"></div>
            </div>
            <div class="loader-status" id="loaderStatus">Загрузка данных</div>
            <div class="error-container" id="errorContainer">
                <div class="error-message" id="errorMessage">Не удалось подключиться к серверу</div>
                <button class="retry-button" id="retryButton">Повторить</button>
            </div>
        </div>
        <div class="copyright">by @skwared</div>
    </div>

    <div id="main-content">
        <div class="header-title">
            <span class="header-logo"><span class="mini-journal-icon"></span></span>
            Журнал 86РТК
        </div>
        
        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="journal">📖 Журнал</button>
            <button class="tab-btn" data-tab="rating">🏆 Рейтинг</button>
        </div>
        
        <!-- Вкладка Журнал -->
        <div class="tab-content active" id="tab-journal">
            <input type="text" id="search" placeholder="Поиск по фамилии" autocomplete="off">
            <div id="list"></div>
        </div>
        
        <!-- Вкладка Рейтинг (4 столбца: Фамилия, 1 сем, 2 сем, Средний) -->
        <div class="tab-content" id="tab-rating">
            <div class="rating-table" id="rating-table">
                <div class="rating-header">
                    <div>#</div>
                    <div>Фамилия</div>
                    <div>1 семестр</div>
                    <div>2 семестр</div>
                    <div>Средний балл</div>
                </div>
                <div id="rating-list"></div>
            </div>
        </div>
        
        <div class="footer-signature">by @skwared</div>
    </div>

    <div class="fab-update" id="fabUpdate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
    </div>

    <script>
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            }
        } catch(e) {}
        
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbwtV3eFenNotdiVr3u1DQPJdOLn2fieHDsvWUwlsQquKURzkLkW4wuTiLqkNFnWCH0v/exec';
        const API_ABSENCES = 'https://script.google.com/macros/s/AKfycbyux4wfN_lVoodDq-JHHjbYAGuJys_DsZ2mADyUGdw1MERG-iZK833dN0tSzI7lq_QeZg/exec';
        
        const CACHE_KEY = 'journal_86rtk_v1';
        
        let ALL_DATA = { journal: [], absences: {} };
        let isLoading = false;
        let currentTab = 'journal';
        
        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold'; 
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }
        
        function calcNeed(currentAvg, marks) {
            if (!marks || marks.length === 0) return null;
            let avg = parseFloat(String(currentAvg).replace(',', '.'));
            if (isNaN(avg) || avg >= 10) return null;
            let decimal = avg - Math.floor(avg);
            if (decimal >= 0.29 && decimal <= 0.51) {
                let target = Math.ceil(avg + 0.001);
                let sum = marks.reduce((a, b) => a + (parseFloat(String(b).replace(',','.')) || 0), 0);
                for (let i = 1; i <= 10; i++) {
                    if ((sum + i * 10) / (marks.length + i) >= target) {
                        return `Нужно ${i} отметок (10) до ${target}.0`;
                    }
                }
            }
            return null;
        }
        
        function showError(message) {
            const loader = document.getElementById('loader');
            const loaderStatus = document.getElementById('loaderStatus');
            const errorContainer = document.getElementById('errorContainer');
            const errorMessage = document.getElementById('errorMessage');
            loader.classList.add('error-mode');
            loaderStatus.textContent = 'Ошибка соединения';
            errorMessage.textContent = message || 'Не удалось подключиться';
            errorContainer.classList.add('visible');
        }
        
        function hideError() {
            const loader = document.getElementById('loader');
            const errorContainer = document.getElementById('errorContainer');
            loader.classList.remove('error-mode');
            errorContainer.classList.remove('visible');
            document.getElementById('loaderStatus').textContent = 'Загрузка данных';
        }
        
        async function init(force = false) {
            if (isLoading) return;
            isLoading = true;
            
            const loader = document.getElementById('loader');
            const loaderStatus = document.getElementById('loaderStatus');
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            hideError();
            loaderStatus.textContent = 'Загрузка данных';
            
            const timeoutId = setTimeout(() => {
                if (isLoading) showError('Сервер не отвечает');
            }, 20000);
            
            const cached = localStorage.getItem(CACHE_KEY);
            if (!force && cached) {
                try {
                    ALL_DATA = JSON.parse(cached);
                    if (ALL_DATA.journal && ALL_DATA.journal.length > 0) {
                        clearTimeout(timeoutId);
                        renderJournal();
                        renderRating();
                        hideLoader();
                        isLoading = false;
                        return;
                    }
                } catch(e) {}
            }
            
            try {
                loaderStatus.textContent = 'Загрузка журнала';
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 15000);
                
                const [resJ, resA] = await Promise.all([
                    fetch(API_JOURNAL, { signal: controller.signal }).then(r => r.json()),
                    fetch(API_ABSENCES, { signal: controller.signal }).then(r => r.json())
                ]);
                
                clearTimeout(timeoutId);
                
                const absMap = {};
                if (Array.isArray(resA)) {
                    resA.forEach(a => { if (a && a.name) absMap[a.name.trim()] = a.count || "0"; });
                }
                
                let journalData = [];
                if (Array.isArray(resJ)) journalData = resJ;
                else if (resJ && resJ.journal && Array.isArray(resJ.journal)) journalData = resJ.journal;
                
                if (!journalData.length) throw new Error('No data');
                
                ALL_DATA = { journal: journalData, absences: absMap };
                localStorage.setItem(CACHE_KEY, JSON.stringify(ALL_DATA));
                
                renderJournal();
                renderRating();
                hideLoader();
                
            } catch (e) {
                clearTimeout(timeoutId);
                if (ALL_DATA.journal && ALL_DATA.journal.length > 0) {
                    loaderStatus.textContent = 'Использую сохранённые данные';
                    setTimeout(() => {
                        renderJournal();
                        renderRating();
                        hideLoader();
                    }, 800);
                } else {
                    showError('Проверьте подключение к интернету');
                }
            } finally {
                isLoading = false;
            }
        }
        
        // Рендер журнала (оригинальная логика)
        function renderJournal() {
            const container = document.getElementById('list');
            if (!container) return;
            container.innerHTML = '';
            const query = document.getElementById('search')?.value.toLowerCase().trim() || '';
            
            if (!ALL_DATA.journal || ALL_DATA.journal.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет данных</div>';
                return;
            }
            
            const sortedByScore = [...ALL_DATA.journal].sort((a,b) => {
                const avgA = parseFloat(String(a.totalAverage).replace(',', '.'));
                const avgB = parseFloat(String(b.totalAverage).replace(',', '.'));
                return avgB - avgA;
            });
            const topNames = sortedByScore.slice(0, 3).map(s => s.studentName);
            const crowns = ['🥇', '🥈', '🥉'];
            
            const list = ALL_DATA.journal
                .filter(s => s && s.studentName && s.studentName.toLowerCase().includes(query))
                .sort((a, b) => a.studentName.localeCompare(b.studentName));
            
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                return;
            }
            
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                const absCount = ALL_DATA.absences[s.studentName] || "0";
                const tIdx = topNames.indexOf(s.studentName);
                
                let subsHtml = '';
                if (s.subjects && Array.isArray(s.subjects)) {
                    subsHtml = s.subjects.map(sub => {
                        const tip = calcNeed(sub.avg, sub.marks);
                        const marksHtml = (sub.marks && Array.isArray(sub.marks)) 
                            ? sub.marks.map(m => `<div class="mark ${getStyle(m)}">${m}</div>`).join('')
                            : '<div style="font-size:11px; opacity:0.4; padding:8px;">Нет оценок</div>';
                        return `<div class="sub-item">
                            <div class="sub-row">
                                <span>${escapeHtml(sub.subject || 'Без названия')}</span>
                                <span class="score-pill ${getStyle(sub.avg)}">${sub.avg || '—'}</span>
                            </div>
                            <div class="marks-box">
                                ${tip ? `<div class="analytic-tip">${tip}</div>` : ''}
                                <div class="marks-row">${marksHtml}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    subsHtml = '<div style="font-size:12px; opacity:0.4; text-align:center; padding:12px;">Нет предметов</div>';
                }
                
                card.innerHTML = `
                    <div class="student-header">
                        <span class="student-name">
                            ${escapeHtml(s.studentName)} ${tIdx !== -1 ? crowns[tIdx] : ''}
                            <span class="abs-badge">⏳ ${absCount}</span>
                        </span>
                        <span class="score-pill ${getStyle(s.totalAverage)}">${s.totalAverage || '—'}</span>
                    </div>
                    <div class="subs-container">${subsHtml}</div>`;
                
                card.onclick = (e) => {
                    e.stopPropagation();
                    const subsContainer = card.querySelector('.subs-container');
                    if (subsContainer) subsContainer.classList.toggle('open');
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                };
                
                card.querySelectorAll('.sub-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const marksBox = item.querySelector('.marks-box');
                        if (marksBox) marksBox.classList.toggle('open');
                    });
                });
                container.appendChild(card);
            });
        }
        
        // Рендер рейтинга с 4 столбцами: Фамилия, 1 семестр, 2 семестр, Средний балл
        function renderRating() {
            const container = document.getElementById('rating-list');
            if (!container) return;
            container.innerHTML = '';
            
            if (!ALL_DATA.journal || ALL_DATA.journal.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет данных для отображения</div>';
                return;
            }
            
            // Получаем данные студентов с семестровыми оценками
            // Предполагаем, что в данных есть поля semester1, semester2, totalAverage
            // Если их нет, генерируем демо-данные на основе subjects
            
            let studentsWithSemesters = ALL_DATA.journal.map(student => {
                let sem1 = null;
                let sem2 = null;
                
                // Если в данных есть прямые поля semester1/semester2 - используем их
                if (student.semester1 !== undefined && student.semester2 !== undefined) {
                    sem1 = student.semester1;
                    sem2 = student.semester2;
                } 
                // Иначе вычисляем на основе предметов (для демонстрации)
                else if (student.subjects && Array.isArray(student.subjects)) {
                    // Для демо: семестр 1 = среднее по первым 3 предметам, семестр 2 = среднее по остальным
                    const allMarks = [];
                    student.subjects.forEach(sub => {
                        if (sub.marks && Array.isArray(sub.marks)) {
                            sub.marks.forEach(m => {
                                const val = parseFloat(String(m).replace(',', '.'));
                                if (!isNaN(val)) allMarks.push(val);
                            });
                        }
                    });
                    if (allMarks.length > 0) {
                        const mid = Math.floor(allMarks.length / 2);
                        const sem1Marks = allMarks.slice(0, mid);
                        const sem2Marks = allMarks.slice(mid);
                        sem1 = sem1Marks.length ? (sem1Marks.reduce((a,b) => a+b,0) / sem1Marks.length).toFixed(1) : null;
                        sem2 = sem2Marks.length ? (sem2Marks.reduce((a,b) => a+b,0) / sem2Marks.length).toFixed(1) : null;
                    }
                }
                
                // Если всё ещё нет - генерируем случайные для примера
                if (sem1 === null) sem1 = (4 + Math.random() * 6).toFixed(1);
                if (sem2 === null) sem2 = (4 + Math.random() * 6).toFixed(1);
                
                const avg = student.totalAverage || ((parseFloat(sem1) + parseFloat(sem2)) / 2).toFixed(1);
                
                return {
                    name: student.studentName,
                    semester1: parseFloat(sem1),
                    semester2: parseFloat(sem2),
                    average: parseFloat(avg)
                };
            });
            
            // Сортируем по среднему баллу (по убыванию)
            studentsWithSemesters.sort((a, b) => b.average - a.average);
            
            studentsWithSemesters.forEach((student, idx) => {
                const row = document.createElement('div');
                row.className = 'rating-row';
                row.innerHTML = `
                    <div class="rating-rank">${idx + 1}</div>
                    <div class="rating-name">${escapeHtml(student.name)}</div>
                    <div class="rating-sem1">${student.semester1.toFixed(1)}</div>
                    <div class="rating-sem2">${student.semester2.toFixed(1)}</div>
                    <div class="rating-avg">${student.average.toFixed(1)}</div>
                `;
                container.appendChild(row);
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function forceUpdate() {
            localStorage.removeItem(CACHE_KEY);
            init(true);
        }
        
        function hideLoader() {
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                mainContent.classList.add('visible');
            }, 500);
        }
        
        // Переключение вкладок
        function switchTab(tabId) {
            currentTab = tabId;
            
            // Обновляем кнопки
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tabId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            // Обновляем контент
            document.querySelectorAll('.tab-content').forEach(content => {
                if (content.id === `tab-${tabId}`) content.classList.add('active');
                else content.classList.remove('active');
            });
            
            if (tabId === 'rating') {
                renderRating(); // перерендер рейтинга при открытии
            }
            
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // Обработчики
        document.getElementById('search')?.addEventListener('input', () => renderJournal());
        document.getElementById('retryButton')?.addEventListener('click', () => forceUpdate());
        document.getElementById('fabUpdate')?.addEventListener('click', () => forceUpdate());
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        
        if (tg) {
            tg.onEvent('backButtonClicked', () => tg.close());
        }
        
        init(true);
    </script>
</body>
</html>
