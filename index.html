<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Журнал Группы</title>
    <script src="https://telegram.org"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        body {
            /* Приятный градиент на фон */
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .subject-row {
            transition: all 0.2s ease;
        }
        .subject-row:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateX(4px);
        }
        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-12">

    <!-- Header -->
    <header class="mb-8 mt-2 px-2">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-1">Колледж • Группа</p>
                <h1 class="text-3xl font-black text-slate-800">Успеваемость</h1>
            </div>
            <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
        </div>
    </header>

    <!-- Поиск -->
    <div class="mb-8 px-1">
        <input type="text" id="search" placeholder="Поиск по фамилии..." 
               class="w-full glass rounded-2xl py-4 px-6 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none transition-all text-slate-700 font-medium">
    </div>

    <div id="app">
        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <div id="content" class="space-y-6"></div>
    </div>

    <script>
        const API_URL = 'ВАША_ССЫЛКА_EXEC';
        
        let studentsData = [];
        const tg = window.Telegram?.WebApp || null;
        if(tg) { tg.expand(); tg.ready(); }

        async function init() {
            try {
                const res = await fetch(API_URL);
                studentsData = await res.json();
                document.getElementById('loader').classList.add('hidden');
                render(studentsData);
            } catch (e) {
                console.error(e);
            }
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';

            data.forEach((student) => {
                const card = document.createElement('div');
                card.className = "glass rounded-[2.5rem] p-6 shadow-xl shadow-slate-200/50 border border-white/80";

                const subjects = student.subjects.map(s => {
                    const grade = parseFloat(s.avg.replace(',', '.'));
                    let colorClass = 'text-slate-700 bg-slate-100';
                    if (grade >= 8) colorClass = 'text-emerald-700 bg-emerald-50';
                    else if (grade >= 5) colorClass = 'text-indigo-700 bg-indigo-50';
                    else if (grade > 0) colorClass = 'text-rose-700 bg-rose-50';

                    return `
                        <div class="subject-row flex justify-between items-center p-3 rounded-2xl mb-1">
                            <span class="text-slate-600 text-sm font-semibold truncate pr-4">${s.subject}</span>
                            <span class="px-3 py-1 rounded-xl font-black text-xs min-w-[40px] text-center ${colorClass}">
                                ${s.avg}
                            </span>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg rotate-3">
                                <span class="text-xl font-bold -rotate-3">${student.studentName.charAt(0)}</span>
                            </div>
                            <div>
                                <h2 class="font-bold text-slate-800 text-lg leading-tight">${student.studentName}</h2>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Студент</p>
                            </div>
                        </div>
                        <div class="bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm text-center">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Средний</p>
                            <p class="text-xl font-black text-indigo-600 leading-none">${student.totalAverage}</p>
                        </div>
                    </div>
                    <div class="space-y-1">
                        ${subjects}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(studentsData.filter(s => s.studentName.toLowerCase().includes(val)));
        });

        init();
    </script>
</body>
</html>
