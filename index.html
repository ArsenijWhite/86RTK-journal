<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал Э-24</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #2d3735; --card: #3a4744; --accent: #10b981; --text: #e2e8f0; --muted: #94a3b8;
            --error: #ff3b30;
        }
        * { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        html, body { background-color: var(--bg); margin: 0; padding: 0; color: var(--text); overflow-y: auto; min-height: 100vh; }
        body { padding: 20px; }

        /* Лоадер */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader-text { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.4em; margin-bottom: 25px; animation: breath 2s infinite; }
        .progress-w { width: 150px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-l { width: 70px; height: 100%; background: #fff; position: absolute; left: -70px; animation: move 2s infinite; box-shadow: 0 0 10px #fff; }

        /* Ошибка (3 секунды) */
        #loader.error-state .progress-l { animation: blink-red 3s infinite !important; width: 100% !important; left: 0 !important; background: var(--error) !important; box-shadow: 0 0 20px var(--error) !important; }
        #loader.error-state .loader-text { color: var(--error) !important; animation: none !important; }

        @keyframes move { 0% { left: -70px; } 100% { left: 150px; } }
        @keyframes breath { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes blink-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }

        /* Контент */
        #main-content { opacity: 0; transition: 0.5s; }
        .header-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; }
        #search { width: 100%; border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 15px; background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 15px; }

        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.1s; }
        .card:active { transform: scale(0.98); }
        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-size: 16px; font-weight: 600; }
        
        .score-pill { font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 8px; min-width: 32px; text-align: center; }
        .m-low { background: #ff3b30; } .m-warn { background: #ff9f0a; } .m-high { background: #34c759; }
        .m-gold { background: linear-gradient(135deg, #ffd700, #ff9500); color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .m-none { background: rgba(255,255,255,0.1); color: var(--muted); }

        .subs-container { display: none; padding-top: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .subs-container.open { display: block; }
        .sub-item { margin-bottom: 12px; }
        .sub-row { display: flex; justify-content: space-between; align-items: center; }
        
        .marks-box { display: none; flex-wrap: wrap; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; margin-top: 8px; }
        .marks-box.open { display: flex; }
        .mark { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">Синхронизация</div>
        <div class="progress-w"><div class="progress-l"></div></div>
    </div>

    <div id="main-content">
        <div class="header-title">Журнал группы</div>
        <input type="text" id="search" placeholder="Поиск по фамилии...">
        <div id="list"></div>
    </div>

    <script>
        const API_URL = 'ССЫЛКА_ИЗ_GAS';
        const tg = window.Telegram?.WebApp;
        let ALL_DATA = [];

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold'; 
            if (v >= 7) return 'm-high';
            if (v >= 4) return 'm-warn';
            return 'm-low';
        }

        async function init() {
            if (tg) { tg.ready(); tg.expand(); tg.headerColor = '#2d3735'; }

            const cached = localStorage.getItem('journal_cache');
            if (cached) {
                ALL_DATA = JSON.parse(cached);
                render(ALL_DATA);
                hideLoader();
            }

            try {
                const res = await fetch(API_URL);
                const newData = await res.json();
                if (newData.error) throw new Error();

                ALL_DATA = newData;
                localStorage.setItem('journal_cache', JSON.stringify(newData));
                render(ALL_DATA);
                hideLoader();
            } catch (e) {
                if (!ALL_DATA.length) {
                    document.getElementById('loader').classList.add('error-state');
                    document.querySelector('.loader-text').innerText = "Ошибка сети";
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
            }
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
            }, 500);
        }

        function render(items) {
            const container = document.getElementById('list');
            container.innerHTML = '';
            
            const sorted = [...items].sort((a, b) => a.studentName.localeCompare(b.studentName));
            const topByScore = [...items].sort((a, b) => parseFloat(b.totalAverage.replace(',','.')) - parseFloat(a.totalAverage.replace(',','.'))).slice(0, 3).map(s => s.studentName);
            const crowns = ['🥇', '🥈', '🥉'];

            sorted.forEach(s => {
                // Фильтр предметов
                const validSubjects = s.subjects.filter(sub => {
                    const avgV = parseFloat(sub.avg.replace(',', '.'));
                    return sub.marks.length > 0 && !isNaN(avgV) && avgV > 0;
                });

                if (validSubjects.length === 0) return;

                const card = document.createElement('div');
                card.className = 'card';
                const topIdx = topByScore.indexOf(s.studentName);

                card.onclick = () => {
                    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    card.querySelector('.subs-container').classList.toggle('open');
                };

                const subsHtml = validSubjects.map(sub => {
                    // Убираем средний балл из списка оценок
                    const cleanMarks = sub.marks.filter(m => m !== sub.avg);
                    return `
                    <div class="sub-item" onclick="event.stopPropagation(); this.querySelector('.marks-box').classList.toggle('open'); if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('soft');">
                        <div class="sub-row">
                            <span style="font-size:13px; opacity:0.7">${sub.subject}</span>
                            <span class="score-pill ${getStyle(sub.avg)}">${sub.avg}</span>
                        </div>
                        <div class="marks-box">
                            ${cleanMarks.map(m => `<div class="mark ${getStyle(m)}">${m}</div>`).join('') || '<span style="font-size:10px; opacity:0.3">Итоговая</span>'}
                        </div>
                    </div>`;
                }).join('');

                card.innerHTML = `
                    <div class="student-header">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="student-name">${s.studentName}</span>
                            ${topIdx !== -1 ? `<span style="font-size:14px">${crowns[topIdx]}</span>` : ''}
                        </div>
                        <span class="score-pill ${getStyle(s.totalAverage)}" style="padding:6px 12px; font-size:13px">${s.totalAverage}</span>
                    </div>
                    <div class="subs-container">${subsHtml}</div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            render(ALL_DATA.filter(x => x.studentName.toLowerCase().includes(val)));
        };

        init();
    </script>
</body>
</html>
