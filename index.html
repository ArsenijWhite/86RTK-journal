<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        /* Now Playing Card */
        .now-playing {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art .placeholder {
            font-size: 48px;
        }

        .track-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .track-artist {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* Audio Controls */
        .audio-controls {
            margin: 20px 0;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 30px;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
            color: white;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Playlist */
        .playlist {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }

        .playlist-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .track-item.active {
            background: rgba(255, 255, 255, 0.25);
        }

        .track-thumb {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }

        .track-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .track-artist-mini {
            font-size: 12px;
            opacity: 0.7;
        }

        .settings-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .settings-input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 8px;
            font-size: 14px;
        }

        .save-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Now Playing -->
        <div class="now-playing">
            <div class="album-art" id="albumArt">
                <div class="placeholder">🎵</div>
            </div>
            <div class="track-title" id="trackTitle">Не выбрано</div>
            <div class="track-artist" id="trackArtist">Выберите трек</div>
            <div class="audio-controls">
                <audio id="audioPlayer" controls></audio>
            </div>
        </div>

        <!-- Playlist -->
        <div class="playlist">
            <div class="playlist-title">🎧 Плейлист</div>
            <div id="playlistContainer">
                <div class="loading">Загрузка музыки...</div>
            </div>
            
            <!-- Settings -->
            <div class="settings-section">
                <div style="font-size: 14px; opacity: 0.9;">⚙️ Настройки</div>
                <input type="text" id="channelId" class="settings-input" placeholder="ID канала или @username">
                <button class="save-btn" onclick="saveChannel()">Сохранить и загрузить</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let currentTrack = null;
        let playlist = [];
        let tg = window.Telegram.WebApp;
        
        // Инициализация Telegram WebApp
        tg.expand();
        tg.enableClosingConfirmation();
        
        // Загрузка сохранённого канала
        function loadSettings() {
            const savedChannel = localStorage.getItem('music_channel');
            if (savedChannel) {
                document.getElementById('channelId').value = savedChannel;
                loadMusicFromChannel(savedChannel);
            }
        }
        
        // Сохранение канала
        function saveChannel() {
            const channel = document.getElementById('channelId').value.trim();
            if (channel) {
                localStorage.setItem('music_channel', channel);
                loadMusicFromChannel(channel);
                tg.showPopup({
                    title: 'Успешно',
                    message: 'Настройки сохранены',
                    buttons: [{type: 'ok'}]
                });
            }
        }
        
        // Загрузка музыки из канала
        async function loadMusicFromChannel(channelId) {
            const container = document.getElementById('playlistContainer');
            container.innerHTML = '<div class="loading">🎵 Загрузка плейлиста...</div>';
            
            // Отправляем запрос к боту для получения музыки из канала
            try {
                const response = await fetch(`https://your-bot-url.com/getMusic?channel=${encodeURIComponent(channelId)}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    playlist = data.tracks;
                    renderPlaylist();
                } else {
                    // Демо-данные для тестирования
                    playlist = getDemoTracks();
                    renderPlaylist();
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                // Демо-данные
                playlist = getDemoTracks();
                renderPlaylist();
            }
        }
        
        // Демо-треки для тестирования
        function getDemoTracks() {
            return [
                {
                    id: 1,
                    title: "Midnight Dreams",
                    artist: "Luna Wave",
                    url: "https://example.com/song1.mp3",
                    cover: "https://via.placeholder.com/200/667eea/ffffff?text=🎵"
                },
                {
                    id: 2,
                    title: "Electric Heart",
                    artist: "Neon Pulse",
                    url: "https://example.com/song2.mp3",
                    cover: "https://via.placeholder.com/200/764ba2/ffffff?text=🎵"
                },
                {
                    id: 3,
                    title: "Silent Echo",
                    artist: "Deep Flow",
                    url: "https://example.com/song3.mp3",
                    cover: "https://via.placeholder.com/200/f093fb/ffffff?text=🎵"
                }
            ];
        }
        
        // Отрисовка плейлиста
        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            if (!playlist.length) {
                container.innerHTML = '<div class="loading">📭 Нет треков. Добавьте музыку в канал</div>';
                return;
            }
            
            container.innerHTML = playlist.map((track, index) => `
                <div class="track-item" onclick="playTrack(${index})">
                    <div class="track-thumb">
                        ${track.cover ? `<img src="${track.cover}" alt="">` : '🎵'}
                    </div>
                    <div class="track-info">
                        <div class="track-name">${escapeHtml(track.title)}</div>
                        <div class="track-artist-mini">${escapeHtml(track.artist || 'Неизвестный исполнитель')}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // Воспроизведение трека
        function playTrack(index) {
            const track = playlist[index];
            if (!track) return;
            
            currentTrack = track;
            
            // Обновляем интерфейс
            document.getElementById('trackTitle').textContent = track.title;
            document.getElementById('trackArtist').textContent = track.artist || 'Неизвестный исполнитель';
            
            const albumArt = document.getElementById('albumArt');
            if (track.cover) {
                albumArt.innerHTML = `<img src="${track.cover}" alt="${track.title}">`;
            } else {
                albumArt.innerHTML = '<div class="placeholder">🎵</div>';
            }
            
            const audio = document.getElementById('audioPlayer');
            audio.src = track.url;
            audio.play().catch(e => console.log('Автовоспроизведение заблокировано'));
            
            // Подсветка активного трека
            document.querySelectorAll('.track-item').forEach((item, i) => {
                if (i === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Отправляем данные в Telegram (опционально)
            tg.sendData(JSON.stringify({
                action: 'play',
                track: track.title,
                artist: track.artist
            }));
        }
        
        // Защита от XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Загрузка настроек при старте
        loadSettings();
        
        // Сохранение прогресса
        window.addEventListener('beforeunload', () => {
            if (currentTrack) {
                localStorage.setItem('last_track', JSON.stringify({
                    id: currentTrack.id,
                    title: currentTrack.title,
                    artist: currentTrack.artist,
                    url: currentTrack.url,
                    cover: currentTrack.cover
                }));
            }
        });
        
        // Восстановление последнего трека
        const lastTrack = localStorage.getItem('last_track');
        if (lastTrack) {
            try {
                const track = JSON.parse(lastTrack);
                if (track) {
                    setTimeout(() => {
                        const index = playlist.findIndex(t => t.id === track.id);
                        if (index !== -1) playTrack(index);
                    }, 1000);
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
